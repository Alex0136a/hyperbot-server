<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HyperBot AI</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0e1a; color: #e2e8f0; font-family: 'IBM Plex Mono','Courier New',monospace; font-size: 13px; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #1e2d4a; border-radius: 3px; }
input { outline: none; }
button { cursor: pointer; font-family: inherit; }

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── API CLIENT ───────────────────────────────────────────────
const API = window.location.origin;

async function apiCall(path, method="GET", body=null, token=null) {
  const headers = { "Content-Type": "application/json" };
  if (token) headers["Authorization"] = `Bearer ${token}`;
  const r = await fetch(`${API}${path}`, {
    method, headers, body: body ? JSON.stringify(body) : null
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail || "Erreur serveur");
  return data;
}

// ── CONSTANTES ───────────────────────────────────────────────
const ALL_COINS = ["BTC","ETH","SOL","ARB","AVAX","LINK","OP","INJ","TIA","BNB","HYPE","PAXG","TAO","WIF","JUP","PENDLE","EIGEN","RENDER","SUI","APT","SEI","DOGE","XRP","NEAR","FTM","AAVE","UNI","CRV","SUSHI","GMX"];
const confColor = c => c>=75?"#34d399":c>=60?"#fbbf24":"#f87171";
const LOGCOL = { system:"#60a5fa", info:"#94a3b8", error:"#f87171", warn:"#fbbf24", ai:"#c084fc", long:"#34d399", short:"#f87171", dim:"#475569" };

// ── RAPPORT TXT ──────────────────────────────────────────────
function generateReport(signals, stats, prices, email) {
  const now = new Date();
  const sep = "=".repeat(60), thin = "-".repeat(60);
  const active = signals.filter(s=>s.action!=="WAIT");
  let t = "";
  t += `${sep}
  HYPERBOT AI -- RAPPORT DE SESSION
${sep}
`;
  t += `  Date     : ${now.toLocaleDateString("fr-FR")} a ${now.toLocaleTimeString("fr-FR")}
`;
  t += `  Compte   : ${email}
`;
  t += `  Serveur  : Autonome 24h/24 · Railway
${sep}

`;
  t += `[ RESUME EXECUTIF ]
${thin}
`;
  t += `  Signaux  : ${stats.total||0} (LONG:${stats.longs||0} / SHORT:${stats.shorts||0})
`;
  t += `  Confiance moy. : ${stats.avg_confidence||0}%
`;
  t += `  Risk/Reward moy. : ${stats.avg_rr||"--"}

`;
  t += `[ PRIX MARCHE ]
${thin}
`;
  Object.entries(prices).forEach(([coin,price])=>{ t+=`  ${coin.padEnd(8)}: $${price?.toLocaleString("en-US",{maximumFractionDigits:4})}
`; });
  t += `
[ SIGNAUX DETAILLES (${active.length}) ]
${thin}
`;
  active.forEach((sig,i)=>{
    t += `
  [${i+1}] ${sig.action} ${sig.coin}/USDC
`;
    t += `  ${"─".repeat(40)}
`;
    t += `  Date        : ${new Date(sig.created_at).toLocaleString("fr-FR")}
`;
    t += `  Confiance   : ${sig.confidence}%
`;
    t += `  Levier      : x${sig.leverage}
`;
    t += `  Taille pos. : ${sig.position_size}% du capital
`;
    t += `  Risk/Reward : ${sig.risk_reward?.toFixed(2)}
`;
    t += `  Timeframe   : ${sig.timeframe}
`;
    t += `  Entree      : $${sig.entry?.toLocaleString("en-US",{maximumFractionDigits:6})}
`;
    t += `  Stop Loss   : $${sig.stop_loss?.toLocaleString("en-US",{maximumFractionDigits:6})}
`;
    t += `  Take Profit1: $${sig.take_profit1?.toLocaleString("en-US",{maximumFractionDigits:6})}
`;
    t += `  Take Profit2: $${sig.take_profit2?.toLocaleString("en-US",{maximumFractionDigits:6})}
`;
    t += `  Analyse IA  : ${sig.reasoning||"--"}
`;
    const ks = JSON.parse(sig.key_signals||"[]");
    if(ks.length) t += `  Signaux cles: ${ks.join(" | ")}
`;
    t += `  RSI         : ${sig.rsi?.toFixed(1)||"--"}
`;
    t += `  ATR         : ${sig.atr?.toFixed(4)||"--"}
`;
    t += `  VWAP        : ${sig.vwap?.toFixed(2)||"--"}
`;
    const cur = prices[sig.coin];
    if(cur){
      const dir=sig.action==="LONG"?1:-1;
      const pnl=((cur-sig.entry)/sig.entry*100*dir).toFixed(2);
      const tp1=sig.action==="LONG"?cur>=sig.take_profit1:cur<=sig.take_profit1;
      const tp2=sig.action==="LONG"?cur>=sig.take_profit2:cur<=sig.take_profit2;
      const sl=sig.action==="LONG"?cur<=sig.stop_loss:cur>=sig.stop_loss;
      t += `  Prix actuel : $${cur.toLocaleString()}
`;
      t += `  PnL estime  : ${pnl>0?"+":""}${pnl}%
`;
      t += `  TP1         : ${tp1?"ATTEINT":"En attente"}
`;
      t += `  TP2         : ${tp2?"ATTEINT":"En attente"}
`;
      t += `  Stop Loss   : ${sl?"TOUCHE":"Intact"}
`;
    }
  });
  t += `
${sep}
  Rapport HyperBot AI · Powered by Claude
  Collez ce rapport dans Claude pour analyse
${sep}
`;
  return t;
}

function downloadTxt(content, filename) {
  const b = new Blob([content],{type:"text/plain;charset=utf-8"});
  const u = URL.createObjectURL(b);
  const a = document.createElement("a");
  a.href=u; a.download=filename; a.click();
  URL.revokeObjectURL(u);
}

// ── LOGIN PAGE ───────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    if (!email || !password) { setError("Remplissez tous les champs"); return; }
    setLoading(true); setError("");
    try {
      const path = mode === "login" ? "/api/login" : "/api/register";
      const data = await apiCall(path, "POST", { email, password });
      if (mode === "register") { setMode("login"); setError("Compte créé ! Connectez-vous."); setLoading(false); return; }
      localStorage.setItem("hb_token", data.token);
      localStorage.setItem("hb_email", data.email);
      onLogin(data.token, data.email);
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0a0e1a"}}>
      <div style={{width:380,background:"#0f1629",border:"1px solid #1e2d4a",borderRadius:12,padding:32}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:48,height:48,borderRadius:12,background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,margin:"0 auto 12px"}}>⚡</div>
          <div style={{fontSize:20,fontWeight:700,color:"#f1f5f9"}}>HyperBot AI</div>
          <div style={{fontSize:11,color:"#64748b",marginTop:4}}>Trading autonome · Hyperliquid</div>
        </div>

        <div style={{display:"flex",gap:4,marginBottom:20,background:"#0a0e1a",borderRadius:8,padding:4}}>
          {["login","register"].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setError("");}}
              style={{flex:1,padding:"8px",borderRadius:6,border:"none",background:mode===m?"#1e2d4a":"transparent",color:mode===m?"#60a5fa":"#64748b",fontSize:11,fontWeight:mode===m?700:400}}>
              {m==="login"?"Connexion":"Créer un compte"}
            </button>
          ))}
        </div>

        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:"#475569",marginBottom:4,letterSpacing:1}}>EMAIL</div>
          <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="votre@email.com"
            style={{width:"100%",background:"#0a0e1a",border:"1px solid #1e2d4a",borderRadius:7,padding:"10px 12px",color:"#e2e8f0",fontSize:12}}/>
        </div>

        <div style={{marginBottom:20}}>
          <div style={{fontSize:10,color:"#475569",marginBottom:4,letterSpacing:1}}>MOT DE PASSE</div>
          <input value={password} onChange={e=>setPassword(e.target.value)} type="password" placeholder="••••••••"
            onKeyDown={e=>e.key==="Enter"&&submit()}
            style={{width:"100%",background:"#0a0e1a",border:"1px solid #1e2d4a",borderRadius:7,padding:"10px 12px",color:"#e2e8f0",fontSize:12}}/>
        </div>

        {error && <div style={{background:error.includes("créé")?"#052e16":"#2d0a0a",border:`1px solid ${error.includes("créé")?"#34d399":"#f87171"}`,borderRadius:6,padding:"8px 12px",marginBottom:12,fontSize:11,color:error.includes("créé")?"#34d399":"#f87171"}}>{error}</div>}

        <button onClick={submit} disabled={loading}
          style={{width:"100%",background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",border:"none",borderRadius:8,padding:"12px",color:"#fff",fontWeight:700,fontSize:13}}>
          {loading?"Chargement...":(mode==="login"?"Se connecter":"Créer le compte")}
        </button>

        <div style={{textAlign:"center",marginTop:16,fontSize:10,color:"#334155"}}>
          Vos données sont chiffrées et stockées en sécurité
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────
function App() {
  const [token, setToken] = useState(()=>localStorage.getItem("hb_token")||"");
  const [email, setEmail] = useState(()=>localStorage.getItem("hb_email")||"");
  const [config, setConfig] = useState(null);
  const [signals, setSignals] = useState([]);
  const [prices, setPrices] = useState({});
  const [stats, setStats] = useState({});
  const [positions, setPositions] = useState([]);
  const [tab, setTab] = useState("dashboard");
  const [logs, setLogs] = useState([]);
  const [paper, setPaper] = useState(null);
  const [aiContinuous, setAiContinuous] = useState(false);
  const [filterHours, setFilterHours] = useState(true);
  const [finnhubKey, setFinnhubKey] = useState("");
  const [filterWeekend, setFilterWeekend] = useState(true);
  const [filterMacro, setFilterMacro] = useState(false);
  const [dailyStats, setDailyStats] = useState(null);
  const [botLogs, setBotLogs] = useState([]);
  const [persistentLogs, setPersistentLogs] = useState(false);
  const [paperSize, setPaperSize] = useState(50);
  const [liveW, setLiveW] = useState("");
  const [liveK, setLiveK] = useState("");
  const [activeCoins, setActiveCoins] = useState(ALL_COINS);
  const [saved, setSaved] = useState(false);
  const [loading, setLoading] = useState(false);
  const logEnd = useRef(null);
  const pollRef = useRef(null);

  const addLog = useCallback((msg, type="info") => {
    setLogs(p=>[...p.slice(-199),{msg,type,time:new Date().toLocaleTimeString("fr-FR")}]);
  },[]);

  const logout = () => {
    apiCall("/api/logout","POST",null,token).catch(()=>{});
    localStorage.removeItem("hb_token");
    localStorage.removeItem("hb_email");
    setToken(""); setEmail("");
  };

  const loadData = useCallback(async () => {
    if (!token) return;
    try {
      const [cfg, sigs, prc, st, pos, pap, botLogsRes] = await Promise.all([
        apiCall("/api/config","GET",null,token),
        apiCall("/api/signals?limit=50","GET",null,token),
        apiCall("/api/prices","GET",null,token),
        apiCall("/api/stats","GET",null,token),
        apiCall("/api/positions","GET",null,token),
        apiCall("/api/paper/portfolio","GET",null,token),
        apiCall("/api/bot/logs","GET",null,token),
      ]);
      setConfig(cfg);
      setPaper(pap);
      setAiContinuous(cfg?.ai_continuous === 1);
      setFilterHours(cfg?.filter_hours !== 0);
      if(cfg?.finnhub_key_preview) setFinnhubKey(cfg?.finnhub_key_preview);
      setFilterWeekend(cfg?.filter_weekend !== 0);
      setFilterMacro(cfg?.filter_macro === 1);
      setBotLogs(botLogsRes?.logs||[]);
      setSignals(sigs?.signals||[]);
      setPrices(prc?.prices||{});
      setStats(st);
      setPositions(pos?.positions||[]);
      setActiveCoins(cfg?.active_coins||ALL_COINS);
      setIsRunning(!!cfg?.is_running);
    } catch(e) { console.error(e); }
  }, [token]);

  useEffect(() => {
    if(token) {
      loadData();
      const id = setInterval(loadData, 15000);
      return () => clearInterval(id);
    }
  }, [token, loadData]);

  useEffect(() => { logEnd.current?.scrollIntoView({behavior:"smooth"}); }, [logs]);

  const startBot = async () => {
    setLoading(true);
    try {
      await apiCall("/api/bot/start","POST",null,token);
      addLog("🚀 Bot démarré — Scan toutes les 60s", "system");
      loadData();
    } catch(e) { addLog(`❌ ${e.message}`, "error"); }
    setLoading(false);
  };

  const stopBot = async () => {
    try {
      await apiCall("/api/bot/stop","POST",null,token);
      addLog("⏹ Bot arrêté", "system");
      loadData();
    } catch(e) { addLog(`❌ ${e.message}`, "error"); }
  };

  const updateTradingMode = async (mode) => {
    if (mode === config?.trading_mode) return;
    const modeLabel = mode === "paper" ? "Paper Trading" : "LIVE (trades reels)";
    const confirm1 = window.confirm(
      `Basculer en mode ${modeLabel} ?

Cela va reinitialiser :
- Tous les signaux
- Tous les trades paper
- L'historique complet
- Le portefeuille (1000 USDC)

Confirmer ?`
    );
    if (!confirm1) return;
    try {
      await apiCall("/api/config","PUT",{trading_mode:mode},token);
      await apiCall("/api/reset-all","POST",null,token);
      loadData();
      addLog(`Mode ${modeLabel} active - reinitialisation complete`, "system");
    } catch(e){ addLog("Erreur: "+e.message,"error"); }
  };

  const saveConfig = async () => {
    try {
      await apiCall("/api/config","PUT",{ wallet:liveW, api_key:(liveK && liveK.indexOf("****")!==0)?liveK:undefined, active_coins:activeCoins },token);
      setSaved(true); setTimeout(()=>setSaved(false),2500);
      addLog("✅ Paramètres sauvegardés", "system");
      loadData();
    } catch(e) { addLog(`❌ ${e.message}`, "error"); }
  };

  if (!token) return <LoginPage onLogin={(t,e)=>{setToken(t);setEmail(e);}}/>;
  if(!config) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0a0e1a",color:"#60a5fa",fontSize:14}}>Chargement...</div>;

  const isRunning = config.is_running;
  const TABS = [
    {id:"dashboard",label:"📊 Tableau de bord"},
    {id:"signaux",label:`⚡ Signaux (${stats.total||0})`},
    {id:"positions",label:`📈 Positions (${positions.length})`},
    {id:"marches",label:`🎯 Marchés (${activeCoins.length}/${ALL_COINS.length})`},
    {id:"parametres",label:"⚙️ Paramètres"},
    {id:"logs",label:"📋 Logs"},
    {id:"paper",label:`🎮 Paper Trading`},
    {id:"rapport",label:"📄 Rapport"},
    {id:"stats",label:"📊 Performance"},
  ];

  return (
    <div style={{background:"#0a0e1a",minHeight:"100vh"}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#0f1629,#1a1f35)",borderBottom:"1px solid #1e2d4a",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>⚡</div>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:"#f1f5f9"}}>HyperBot AI</div>
            <div style={{fontSize:10,color:"#64748b"}}>{email}</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:isRunning?"#34d399":"#475569",boxShadow:isRunning?"0 0 8px #34d399":"none"}}/>
            <span style={{fontSize:11,color:isRunning?"#34d399":"#64748b"}}>{isRunning?"ACTIF":"INACTIF"}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:2,background:"#050810",borderRadius:6,padding:3,border:"1px solid #1e2d4a"}}>
            <button onClick={()=>updateTradingMode("paper")} style={{padding:"4px 8px",borderRadius:4,border:"none",background:config?.trading_mode==="paper"?"#1e2d4a":"transparent",color:config?.trading_mode==="paper"?"#fbbf24":"#475569",fontSize:10,fontWeight:700,cursor:"pointer"}}>PAPER</button>
            <button onClick={()=>updateTradingMode("live")} style={{padding:"4px 8px",borderRadius:4,border:"none",background:config?.trading_mode==="live"?"#052e16":"transparent",color:config?.trading_mode==="live"?"#34d399":"#475569",fontSize:10,fontWeight:700,cursor:"pointer"}}>LIVE</button>
          </div>
          {isRunning
            ? <button onClick={stopBot} style={{background:"#2d0a0a",border:"1px solid #f87171",borderRadius:6,padding:"5px 12px",color:"#f87171",fontSize:11,fontWeight:700}}>ARRETER</button>
            : <button onClick={startBot} disabled={loading} style={{background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",border:"none",borderRadius:6,padding:"5px 14px",color:"#fff",fontSize:11,fontWeight:700}}>{loading?"...":"DEMARRER"}</button>
          }
          <button onClick={logout} style={{background:"transparent",border:"1px solid #1e2d4a",borderRadius:6,padding:"5px 10px",color:"#64748b",fontSize:10}}>Déconnexion</button>
        </div>
      </div>

      {/* STATS */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:1,background:"#1e2d4a"}}>
        {[{l:"SIGNAUX",v:stats.total||0,c:"#60a5fa"},{l:"LONG",v:stats.longs||0,c:"#34d399"},{l:"SHORT",v:stats.shorts||0,c:"#f87171"},{l:"CONFIANCE",v:stats.avg_confidence?`${stats.avg_confidence}%`:"--",c:confColor(stats.avg_confidence||0)}].map((s,i)=>(
          <div key={i} style={{background:"#0a0e1a",padding:"10px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:700,color:s.c}}>{s.v}</div>
            <div style={{fontSize:9,color:"#475569",marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* TABS */}
      <div style={{display:"flex",borderBottom:"1px solid #1e2d4a",background:"#0f1629",overflowX:"auto"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id); if(t.id==="stats") apiCall("/api/stats/daily","GET",null,token).then(r=>setDailyStats(r));}} style={{padding:"10px 14px",background:"transparent",border:"none",borderBottom:tab===t.id?"2px solid #3b82f6":"2px solid transparent",color:tab===t.id?"#60a5fa":"#64748b",fontSize:11,fontWeight:tab===t.id?700:400,whiteSpace:"nowrap"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* DASHBOARD */}
      {tab==="dashboard" && (
        <div style={{padding:16}}>
          <div style={{background:"#0f1629",border:"1px solid #1e2d4a",borderRadius:10,padding:14,marginBottom:14}}>
            <div style={{fontSize:10,color:"#475569",marginBottom:10,letterSpacing:1}}>PRIX EN TEMPS RÉEL</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
              {ALL_COINS.filter(c=>prices[c]).map(coin=>(
                <div key={coin} style={{background:"#0a0e1a",border:"1px solid #1e2d4a",borderRadius:5,padding:"5px 10px",display:"flex",gap:7,alignItems:"center"}}>
                  <span style={{color:"#64748b",fontSize:10}}>{coin}</span>
                  <span style={{color:"#e2e8f0",fontWeight:700,fontSize:12}}>${prices[coin]?.toLocaleString("en-US",{maximumFractionDigits:2})}</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div style={{background:"#0f1629",border:"1px solid #1e2d4a",borderRadius:10,padding:14}}>
              <div style={{fontSize:10,color:"#475569",marginBottom:8,letterSpacing:1}}>ACTIVITE DU BOT</div>
            <div style={{maxHeight:100,overflowY:"auto",marginBottom:12}}>
              {botLogs.length===0
                ? <div style={{fontSize:9,color:"#334155",fontFamily:"monospace"}}>{isRunning?"⚡ En attente...":"● Bot arrêté"}</div>
                : botLogs.slice(0,6).map((log,i)=>(
                  <div key={i} style={{display:"flex",gap:6,marginBottom:2}}>
                    <span style={{fontSize:9,color:"#334155",whiteSpace:"nowrap",fontFamily:"monospace"}}>{log.time}</span>
                    <span style={{fontSize:9,fontFamily:"monospace",color:log.level==="success"?"#34d399":log.level==="error"?"#f87171":log.level==="warning"?"#fbbf24":"#475569"}}>{log.message}</span>
                  </div>
                ))
              }
            </div>
            <div style={{fontSize:9,color:"#475569",marginBottom:10,letterSpacing:1}}>DERNIERS SIGNAUX</div>
              {signals.filter(s=>s.action!=="WAIT").slice(0,5).length===0
                ? <div style={{color:"#334155",fontSize:11,padding:"16px 0",textAlign:"center"}}>{isRunning?"Analyse en cours...":"Démarrez le bot"}</div>
                : signals.filter(s=>s.action!=="WAIT").slice(0,5).map(sig=>(
                  <div key={sig.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #0a0e1a"}}>
                    <div style={{display:"flex",gap:7,alignItems:"center"}}>
                      <span style={{background:sig.action==="LONG"?"#052e16":"#2d0a0a",color:sig.action==="LONG"?"#34d399":"#f87171",padding:"2px 7px",borderRadius:4,fontSize:10,fontWeight:700}}>{sig.action}</span>

              {l:"PNL OUVERT",v:`${paper?.total_pnl>=0?"+":""}${paper?.total_pnl?.toFixed(2)||"0.00"} USDC`,c:paper?.total_pnl>=0?"#34d399":"#f87171"},
              {l:"PERFORMANCE",v:`${paper?.total_pnl_pct>=0?"+":""}${paper?.total_pnl_pct?.toFixed(2)||"0.00"}%`,c:paper?.total_pnl_pct>=0?"#34d399":"#f87171"},
              {l:"TRADES OUVERTS",v:paper?.open_trades?.length||0,c:"#c084fc"},
            ].map((s,i)=>(
              <div key={i} style={{background:"#0f1629",border:"1px solid #1e2d4a",borderRadius:8,padding:"12px",textAlign:"center"}}>
                <div style={{fontSize:16,fontWeight:700,color:s.c}}>{s.v}</div>
                <div style={{fontSize:9,color:"#475569",marginTop:2}}>{s.l}</div>
              </div>
            ))}
          </div>

          {/* MODE BANNER + SETTINGS */}
          <div style={{background:"#0f1629",border:"1px solid #1e2d4a",borderRadius:10,padding:16,marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:config?.trading_mode==="paper"?"#fbbf24":"#34d399"}}>
                  {config?.trading_mode==="paper"?"Mode Paper — Simulation autonome":"Mode Live — Trades reels"}
                </div>
                <div style={{fontSize:10,color:"#475569",marginTop:2}}>
                  {config?.trading_mode==="paper"?"Le bot execute automatiquement chaque signal avec capital virtuel":"ATTENTION: trades sur votre vrai compte Hyperliquid"}
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:2,background:"#050810",borderRadius:6,padding:3,border:"1px solid #1e2d4a"}}>
                <button onClick={()=>updateTradingMode("paper")} style={{padding:"6px 12px",borderRadius:4,border:"none",background:config?.trading_mode==="paper"?"#1e2d4a":"transparent",color:config?.trading_mode==="paper"?"#fbbf24":"#475569",fontWeight:700,fontSize:11,cursor:"pointer"}} title="Reinitialise signaux et trades au changement">PAPER</button>
                <button onClick={()=>updateTradingMode("live")} style={{padding:"6px 12px",borderRadius:4,border:"none",background:config?.trading_mode==="live"?"#052e16":"transparent",color:config?.trading_mode==="live"?"#34d399":"#475569",fontWeight:700,fontSize:11,cursor:"pointer"}} title="Reinitialise signaux et trades au changement">LIVE</button>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div>
                <div style={{fontSize:9,color:"#475569",marginBottom:4,letterSpacing:1}}>TAILLE PAR TRADE (% DU CAPITAL)</div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <input type="number" defaultValue={config?.position_pct||8} min="1" max="50"
                    onBlur={e=>apiCall("/api/config","PUT",{position_pct:Number(e.target.value)},token).then(loadData)}
                    style={{flex:1,background:"#0a0e1a",border:"1px solid #1e2d4a",borderRadius:6,padding:"8px 10px",color:"#e2e8f0",fontFamily:"inherit",fontSize:12}}/>
                  <span style={{color:"#60a5fa",fontWeight:700,fontSize:14}}>%</span>
                </div>
                <div style={{fontSize:9,color:"#334155",marginTop:4}}>≈ {Math.round((config?.position_pct||5)*10)} USDC sur 1000 USDC · Adaptatif</div>
              </div>
              <div>
                <div style={{fontSize:10,color:"#f59e0b",marginBottom:6,fontWeight:700,letterSpacing:1}}>⚡ QUICK PROFIT (USDC)</div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <input type="number" min="0.5" max="10" step="0.5" defaultValue={config?.quick_profit_usd||1}
                    onBlur={e=>apiCall("/api/config","PUT",{quick_profit_usd:Number(e.target.value)},token).then(loadData)}
                    style={{flex:1,background:"#0a0e1a",border:"1px solid #f59e0b",borderRadius:6,padding:"8px 10px",color:"#f59e0b",fontFamily:"inherit",fontSize:12}}/>
                  <span style={{color:"#f59e0b",fontWeight:700,fontSize:14}}>$</span>
                </div>
                <div style={{fontSize:9,color:"#334155",marginTop:4}}>Fermeture automatique dès ce profit atteint (frais inclus)</div>
              </div>
              <div>
                <div style={{fontSize:10,color:"#f87171",marginBottom:6,fontWeight:700,letterSpacing:1}}>🛡️ MAX LOSS (USDC)</div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <input type="number" min="0.25" max="5" step="0.25" defaultValue={config?.max_loss_usd||0.5}
                    onBlur={e=>apiCall("/api/config","PUT",{max_loss_usd:Number(e.target.value)},token).then(loadData)}
                    style={{flex:1,background:"#0a0e1a",border:"1px solid #f87171",borderRadius:6,padding:"8px 10px",color:"#f87171",fontFamily:"inherit",fontSize:12}}/>
                  <span style={{color:"#f87171",fontWeight:700,fontSize:14}}>$</span>
                </div>
                <div style={{fontSize:9,color:"#334155",marginTop:4}}>Fermeture automatique si perte dépasse ce montant</div>
              </div>
              <div>
                <div style={{fontSize:9,color:"#475569",marginBottom:4,letterSpacing:1}}>TRADES SIMULTANES MAX</div>
                <input type="number" defaultValue={config?.max_open_trades||5} min="1" max="20"
                  onBlur={e=>apiCall("/api/config","PUT",{max_open_trades:Number(e.target.value)},token).then(loadData)}
                  style={{width:"100%",background:"#0a0e1a",border:"1px solid #1e2d4a",borderRadius:6,padding:"8px 10px",color:"#e2e8f0",fontFamily:"inherit",fontSize:12}}/>
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:10,color:"#334155"}}>
                Solde initial: 1000 USDC · Le bot trade seul 24h/24
              </div>
              <button onClick={async()=>{
                if(!confirm("Reinitialiser le portefeuille a 1000 USDC ?"))return;
                await apiCall("/api/paper/reset","POST",null,token);
                loadData();
              }} style={{background:"transparent",border:"1px solid #334155",borderRadius:5,padding:"5px 10px",color:"#64748b",fontSize:10}}>
                Reinitialiser
              </button>
            </div>
          </div>

          {/* TRADES OUVERTS */}
          <div style={{background:"#0f1629",border:"1px solid #1e2d4a",borderRadius:10,padding:16,marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:"#60a5fa",marginBottom:12}}>📈 Trades ouverts</div>
            {!paper?.open_trades?.length
              ? <div style={{color:"#334155",fontSize:11,textAlign:"center",padding:"20px 0"}}>Aucun trade ouvert — exécutez un signal !</div>
              : paper.open_trades.map(trade=>(
                <div key={trade.id} style={{background:"#0a0e1a",borderRadius:8,padding:12,marginBottom:8,border:`1px solid ${trade.pnl>=0?"#14532d":"#450a0a"}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <span style={{background:trade.action==="LONG"?"#052e16":"#2d0a0a",color:trade.action==="LONG"?"#34d399":"#f87171",padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:700}}>{trade.action}</span>
                      <span style={{color:"#f1f5f9",fontWeight:700}}>{trade.coin}/USDC</span>
                      <span style={{color:"#64748b",fontSize:10}}>x{trade.leverage}</span>
                    </div>
                    <div style={{display:"flex",gap:12,alignItems:"center"}}>
                      <span style={{color:trade.pnl>=0?"#34d399":"#f87171",fontWeight:700,fontSize:14}}>
                        {trade.pnl>=0?"+":""}{trade.pnl?.toFixed(2)} USDC
                      </span>
                      <span style={{color:trade.pnl>=0?"#34d399":"#f87171",fontSize:11}}>
                        ({trade.pnl_pct>=0?"+":""}{trade.pnl_pct?.toFixed(2)}%)
                      </span>
                      <button onClick={async()=>{
                        await apiCall("/api/paper/close","POST",{trade_id:trade.id,reason:"MANUEL"},token);
                        loadData();
                      }} style={{background:"#2d0a0a",border:"1px solid #f87171",borderRadius:5,padding:"3px 10px",color:"#f87171",fontSize:10,fontWeight:700}}>
                        Fermer
                      </button>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                    {[
                      {l:"ENTRÉE",v:`$${trade.entry_price?.toLocaleString("en-US",{maximumFractionDigits:4})}`},
                      {l:"ACTUEL",v:`$${trade.current_price?.toLocaleString("en-US",{maximumFractionDigits:4})}`},
                      {l:"TAILLE",v:`${trade.size_usdc} USDC`},
                      {l:"OUVERT",v:new Date(trade.opened_at).toLocaleTimeString("fr-FR")},
                    ].map((x,i)=>(
                      <div key={i} style={{background:"#0f1629",borderRadius:5,padding:"5px 8px"}}>
                        <div style={{fontSize:8,color:"#475569"}}>{x.l}</div>
                        <div style={{color:"#94a3b8",fontSize:11,fontWeight:500}}>{x.v}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:8,marginTop:8,fontSize:10}}>
                    <span style={{color:"#f87171"}}>SL: ${trade.stop_loss?.toFixed(4)}</span>
                    <span style={{color:"#34d399"}}>TP1: ${trade.take_profit1?.toFixed(4)}</span>
                    <span style={{color:"#34d399"}}>TP2: ${trade.take_profit2?.toFixed(4)}</span>
                  </div>
                </div>
              ))
            }
          </div>

          {/* HISTORIQUE */}
          {paper?.closed_trades?.length > 0 && (
            <div style={{background:"#0f1629",border:"1px solid #1e2d4a",borderRadius:10,padding:16}}>
              <div style={{fontSize:12,fontWeight:700,color:"#60a5fa",marginBottom:12}}>📋 Historique (20 derniers)</div>
              {paper.closed_trades.map(trade=>(
                <div key={trade.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #0a0e1a"}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{color:trade.action==="LONG"?"#34d399":"#f87171",fontSize:10,fontWeight:700}}>{trade.action}</span>
                    <span style={{color:"#e2e8f0",fontSize:11}}>{trade.coin}</span>
                    <span style={{background:"#1e2d4a",color:"#60a5fa",padding:"1px 6px",borderRadius:3,fontSize:9}}>{trade.close_reason}</span>
                  </div>
                  <div style={{display:"flex",gap:12,alignItems:"center"}}>
                    <span style={{color:trade.pnl>=0?"#34d399":"#f87171",fontWeight:700,fontSize:12}}>
                      {trade.pnl>=0?"+":""}{trade.pnl?.toFixed(2)} USDC
                    </span>
                    <span style={{color:"#475569",fontSize:10}}>{new Date(trade.closed_at).toLocaleTimeString("fr-FR")}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* STATS PERFORMANCE */}
      {tab==="stats" && (
        <div style={{padding:14}}>
          {!dailyStats ? <div style={{color:"#475569",fontSize:12,textAlign:"center",padding:40}}>Chargement...</div> : (<>
          {/* RESUME GLOBAL */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
            <div style={{background:"#052e16",border:"1px solid #34d399",borderRadius:10,padding:14,textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:800,color:"#34d399"}}>{dailyStats.summary.total_wins}</div>
              <div style={{fontSize:10,color:"#34d399"}}>TRADES GAGNANTS</div>
              <div style={{fontSize:14,fontWeight:700,color:"#34d399"}}>+{dailyStats.summary.total_wins_usdc} USDC</div>
            </div>
            <div style={{background:"#2d0a0a",border:"1px solid #f87171",borderRadius:10,padding:14,textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:800,color:"#f87171"}}>{dailyStats.summary.total_losses}</div>
              <div style={{fontSize:10,color:"#f87171"}}>TRADES PERDANTS</div>
              <div style={{fontSize:14,fontWeight:700,color:"#f87171"}}>{dailyStats.summary.total_losses_usdc} USDC</div>
            </div>
            <div style={{background:"#0a0e1a",border:"1px solid #3b82f6",borderRadius:10,padding:14,textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:800,color:"#60a5fa"}}>{dailyStats.summary.win_rate}%</div>
              <div style={{fontSize:10,color:"#60a5fa"}}>WIN RATE</div>
              <div style={{fontSize:14,fontWeight:700,color: (dailyStats.summary.total_wins_usdc + dailyStats.summary.total_losses_usdc) >= 0 ? "#34d399":"#f87171"}}>
                {(dailyStats.summary.total_wins_usdc + dailyStats.summary.total_losses_usdc).toFixed(2)} USDC NET
              </div>
            </div>
          </div>

          {/* STATS PAR JOUR */}
          <div style={{background:"#0a0e1a",borderRadius:10,padding:14,border:"1px solid #1e2d4a",marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:10,letterSpacing:1}}>PAR JOUR</div>
            {dailyStats.daily.map((d,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #0f1629"}}>
                <span style={{fontSize:11,color:"#64748b"}}>{d.day}</span>
                <span style={{fontSize:11,color:"#34d399"}}>✅ {d.wins} (+{d.total_wins_usdc?.toFixed(2)} USDC)</span>
                <span style={{fontSize:11,color:"#f87171"}}>❌ {d.losses} ({d.total_losses_usdc?.toFixed(2)} USDC)</span>
                <span style={{fontSize:11,fontWeight:700,color:d.net_pnl>=0?"#34d399":"#f87171"}}>{d.net_pnl?.toFixed(2)} USDC</span>
              </div>
            ))}
          </div>

          {/* DETAIL GAINS */}
          <div style={{background:"#052e16",borderRadius:10,padding:14,border:"1px solid #34d399",marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#34d399",marginBottom:10,letterSpacing:1}}>✅ TRADES GAGNANTS</div>
            {dailyStats.wins.map((t,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #0a2a1a",fontSize:10}}>
                <span style={{color:"#34d399",fontWeight:700}}>{t.action} {t.coin}</span>
                <span style={{color:"#64748b"}}>{t.close_reason}</span>
                <span style={{color:"#34d399",fontWeight:700}}>+{t.pnl?.toFixed(2)} USDC</span>
                <span style={{color:"#334155"}}>{t.closed_at?.slice(11,16)}</span>
              </div>
            ))}
          </div>

          {/* DETAIL PERTES */}
          <div style={{background:"#2d0a0a",borderRadius:10,padding:14,border:"1px solid #f87171"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#f87171",marginBottom:10,letterSpacing:1}}>❌ TRADES PERDANTS</div>
            {dailyStats.losses.map((t,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #2a0a0a",fontSize:10}}>
                <span style={{color:"#f87171",fontWeight:700}}>{t.action} {t.coin}</span>
                <span style={{color:"#64748b"}}>{t.close_reason}</span>
                <span style={{color:"#f87171",fontWeight:700}}>{t.pnl?.toFixed(2)} USDC</span>
                <span style={{color:"#334155"}}>{t.closed_at?.slice(11,16)}</span>
              </div>
            ))}
          </div>
          </>)}
        </div>
      )}

      {/* RAPPORT */}
      {tab==="rapport" && (
        <div style={{padding:16,maxWidth:800}}>
          <div style={{background:"#0f1629",border:"1px solid #1e2d4a",borderRadius:10,padding:20,marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:"#60a5fa",marginBottom:4}}>📄 Rapport de session</div>
            <div style={{fontSize:11,color:"#475569",marginBottom:16,lineHeight:1.7}}>
              Exportez tous les signaux avec niveaux, suivi TP/SL et analyse IA. Collez dans Claude pour analyse approfondie.
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>
              {[{l:"Signaux",v:stats.total||0,c:"#60a5fa"},{l:"Confiance moy.",v:`${stats.avg_confidence||0}%`,c:confColor(stats.avg_confidence||0)},{l:"R/R moyen",v:stats.avg_rr||"--",c:"#c084fc"}].map((s,i)=>(
                <div key={i} style={{background:"#0a0e1a",borderRadius:6,padding:"9px",textAlign:"center"}}>
                  <div style={{fontSize:18,fontWeight:700,color:s.c}}>{s.v}</div>
                  <div style={{fontSize:9,color:"#475569",marginTop:2}}>{s.l}</div>
                </div>
              ))}
            </div>
            <div style={{background:"#0a0e1a",borderRadius:7,padding:12,marginBottom:14}}>
              <div style={{fontSize:10,color:"#475569",marginBottom:8,letterSpacing:1}}>SUIVI TP/SL EN TEMPS REEL</div>
              {signals.filter(s=>s.action!=="WAIT").length===0
                ?<div style={{color:"#334155",fontSize:11}}>Aucun signal a suivre.</div>
                :signals.filter(s=>s.action!=="WAIT").slice(0,10).map(sig=>{
                  const cur=prices[sig.coin]; if(!cur) return null;
                  const dir=sig.action==="LONG"?1:-1;
                  const pnl=((cur-sig.entry)/sig.entry*100*dir).toFixed(2);
                  const tp1=sig.action==="LONG"?cur>=sig.take_profit1:cur<=sig.take_profit1;
                  const tp2=sig.action==="LONG"?cur>=sig.take_profit2:cur<=sig.take_profit2;
                  const sl=sig.action==="LONG"?cur<=sig.stop_loss:cur>=sig.stop_loss;
                  return (
                    <div key={sig.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #0f1629"}}>
                      <div style={{display:"flex",gap:7,alignItems:"center"}}>
                        <span style={{color:sig.action==="LONG"?"#34d399":"#f87171",fontSize:10,fontWeight:700}}>{sig.action}</span>
                        <span style={{color:"#e2e8f0",fontSize:11}}>{sig.coin}</span>
                        <span style={{color:"#475569",fontSize:10}}>{new Date(sig.created_at).toLocaleTimeString("fr-FR")}</span>
                      </div>
                      <div style={{display:"flex",gap:8,fontSize:10}}>
                        <span style={{color:parseFloat(pnl)>=0?"#34d399":"#f87171",fontWeight:700}}>{pnl>0?"+":""}{pnl}%</span>
                        <span style={{color:tp1?"#34d399":"#334155"}}>TP1{tp1?"✓":"○"}</span>
                        <span style={{color:tp2?"#34d399":"#334155"}}>TP2{tp2?"✓":"○"}</span>
                        <span style={{color:sl?"#f87171":"#334155"}}>SL{sl?"✗":"○"}</span>
                      </div>
                    </div>
                  );
                })
              }
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>downloadTxt(generateReport(signals,stats,prices,email),`hyperbot-${new Date().toISOString().slice(0,10)}.txt`)}
                style={{flex:1,background:"linear-gradient(135deg,#1d4ed8,#7c3aed)",border:"none",borderRadius:8,padding:"11px",color:"#fff",fontWeight:700,fontSize:12}}>
                ⬇️ Telecharger .txt
              </button>
              <button onClick={()=>navigator.clipboard.writeText(generateReport(signals,stats,prices,email)).then(()=>alert("Copie dans le presse-papier !"))}
                style={{flex:1,background:"#0f1629",border:"1px solid #1e2d4a",borderRadius:8,padding:"11px",color:"#94a3b8",fontWeight:700,fontSize:12}}>
                📋 Copier pour Claude
              </button>
            </div>
          </div>
        </div>
      )}

      <div style={{textAlign:"center",padding:"14px",color:"#1e2d4a",fontSize:10,borderTop:"1px solid #0f1629",marginTop:16}}>
        HyperBot AI — Serveur autonome 24h/24 · Powered by Claude
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
