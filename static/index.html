// ── API CLIENT ───────────────────────────────────────────────
const API = window.location.origin;

async function apiCall(path, method="GET", body=null, token=null) {
  const headers = { "Content-Type": "application/json" };
  if (token) headers["Authorization"] = `Bearer ${token}`;
  const r = await fetch(`${API}${path}`, {
    method, headers, body: body ? JSON.stringify(body) : null
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail || "Erreur serveur");
  return data;
}

// ── CONSTANTES ───────────────────────────────────────────────
const ALL_COINS = ["BTC","ETH","SOL","ARB","AVAX","LINK","OP","INJ","TIA","BNB","HYPE","PAXG","TAO","WIF","JUP","PENDLE","EIGEN","RENDER","SUI","APT","SEI","DOGE","XRP","NEAR","FTM","AAVE","UNI","CRV","SUSHI","GMX"];
const confColor = c => c>=75?"#34d399":c>=60?"#fbbf24":"#f87171";
const formatDuration = (openedAt) => {
  if(!openedAt) return "--";
  // Le timestamp backend est en UTC sans suffixe "Z" — on le force explicitement en UTC
  const opened = new Date(openedAt.endsWith("Z")?openedAt:openedAt+"Z");
  const diffMs = Date.now() - opened.getTime();
  if(diffMs < 0 || isNaN(diffMs)) return "--";
  const totalSec = Math.floor(diffMs/1000);
  const h = Math.floor(totalSec/3600);
  const m = Math.floor((totalSec%3600)/60);
  const s = totalSec%60;
  return h>0?`${h}h ${String(m).padStart(2,"0")}m`:`${m}m ${String(s).padStart(2,"0")}s`;
};
const LOGCOL = { system:"#60a5fa", info:"#94a3b8", error:"#f87171", warn:"#fbbf24", ai:"#c084fc", long:"#34d399", short:"#f87171", dim:"#475569" };

// ── RAPPORT TXT ──────────────────────────────────────────────
function generateSessionCSV(session) {
  let csv = "Actif,Trades,Gains,Pertes,Win Rate,Net USDC,Total Gains,Total Pertes\n";
  (session.by_coin||[]).forEach(c => {
    csv += `${c.coin},${c.total},${c.wins},${c.losses},${Math.round(c.wins/Math.max(c.total,1)*100)}%,${Math.round((c.net||0)*100)/100},${Math.round((c.gains||0)*100)/100},${Math.round((c.pertes||0)*100)/100}\n`;
  });
  csv += `\nTOTAL,${session.total_trades},${session.wins},${session.losses},${Math.round(session.wins/Math.max(session.total_trades,1)*100)}%,${Math.round((session.net_pnl||0)*100)/100},,\n`;
  return csv;
}

function generateBilan(bilan, paper) {
  if(!bilan) return "Bilan non disponible";
  const sep = "=".repeat(60), thin = "-".repeat(60);
  const now = new Date();
  let t = "";
  t += `${sep}\n  HYPERBOT AI -- BILAN FINANCIER\n${sep}\n`;
  t += `  Date     : ${now.toLocaleDateString("fr-FR")} à ${now.toLocaleTimeString("fr-FR")}\n`;
  t += `${sep}\n\n`;
  
  t += `[ CAPITAL ]\n${thin}\n`;
  t += `  Balance disponible : ${bilan.balance} USDC\n`;
  t += `  Capital total      : ${bilan.total_capital} USDC\n`;
  t += `  Capital initial    : ${bilan.initial_balance} USDC\n`;
  t += `  Performance        : ${bilan.performance_pct>=0?"+":""}${bilan.performance_pct}%\n`;
  t += `  PnL ouvert         : ${bilan.open_pnl>=0?"+":""}${bilan.open_pnl} USDC (${bilan.open_count} trades)\n`;
  if(bilan.reset_at) {
    const start = new Date(bilan.reset_at+"Z");
    const diff = Math.floor((new Date() - start) / 1000);
    const h = Math.floor(diff/3600);
    const m = Math.floor((diff%3600)/60);
    const ratePerH = h > 0 ? (bilan.total?.net / (h + m/60)).toFixed(2) : "N/A";
    t += `  Durée trading      : ${h}h${String(m).padStart(2,"0")} | Rendement: ${ratePerH} USDC/h\n`;
  }
  t += `\n`;
  
  t += `[ AUJOURD'HUI ]\n${thin}\n`;
  t += `  Trades total : ${bilan.today.total}\n`;
  t += `  Gains        : ${bilan.today.wins} trades | +${bilan.today.gains} USDC\n`;
  t += `  Pertes       : ${bilan.today.losses} trades | ${bilan.today.pertes} USDC\n`;
  t += `  Win rate     : ${bilan.today.win_rate}%\n`;
  t += `  NET DU JOUR  : ${bilan.today.net>=0?"+":""}${bilan.today.net} USDC\n\n`;
  
  t += `[ TOTAL DEPUIS LE DÉBUT ]\n${thin}\n`;
  t += `  Trades total : ${bilan.total.total}\n`;
  t += `  Gains        : ${bilan.total.wins} trades | +${bilan.total.gains} USDC\n`;
  t += `  Pertes       : ${bilan.total.losses} trades | ${bilan.total.pertes} USDC\n`;
  t += `  Win rate     : ${bilan.total.win_rate}%\n`;
  t += `  NET TOTAL    : ${bilan.total.net>=0?"+":""}${bilan.total.net} USDC\n\n`;
  
  t += `[ 7 DERNIERS JOURS ]\n${thin}\n`;
  (bilan.daily||[]).forEach(d=>{
    t += `  ${d.day} | ✅${d.wins} ❌${d.losses} | ${d.net>=0?"+":""}${Math.round(d.net*100)/100} USDC\n`;
  });
  
  if(paper) {
    t += `\n[ TRADES OUVERTS ]\n${thin}\n`;
    (paper.open_trades||[]).forEach(tr=>{
      t += `  ${tr.action} ${tr.coin} | Entrée: ${tr.entry_price} | PnL: ${tr.pnl>=0?"+":""}${tr.pnl} USDC\n`;
    });
  }
  
  t += `\n${sep}\n  HyperBot AI · Analyse Claude\n${sep}\n`;
  return t;
}

function generateReport(signals, stats, prices, email, paper) {
  const now = new Date();
  const sep = "=".repeat(60), thin = "-".repeat(60);
  const active = signals.filter(s=>s.action!=="WAIT");
  let t = "";
  t += `${sep}
  HYPERBOT AI -- RAPPORT DE SESSION
${sep}
`;
  t += `  Date     : ${now.toLocaleDateString("fr-FR")} a ${now.toLocaleTimeString("fr-FR")}
`;
  t += `  Compte   : ${email}
`;
  t += `  Serveur  : Autonome 24h/24 · Railway
${sep}

`;
  t += `[ RESUME EXECUTIF ]
${thin}
`;
  t += `  Signaux  : ${stats.total||0} (LONG:${stats.longs||0} / SHORT:${stats.shorts||0})
`;
  t += `  Confiance moy. : ${stats.avg_confidence||0}%
`;
  t += `  Risk/Reward moy. : ${stats.avg_rr||"--"}

`;
  t += `[ PRIX MARCHE ]
${thin}
`;
  Object.entries(prices).forEach(([coin,price])=>{ t+=`  ${coin.padEnd(8)}: $${price?.toLocaleString("en-US",{maximumFractionDigits:4})}
`; });
  t += `
[ SIGNAUX DETAILLES (${active.length}) ]
${thin}
`;
  active.forEach((sig,i)=>{
    t += `
  [${i+1}] ${sig.action} ${sig.coin}/USDC
`;
    t += `  ${"─".repeat(40)}
`;
    t += `  Date        : ${new Date(sig.created_at).toLocaleString("fr-FR")}
`;
    t += `  Confiance   : ${sig.confidence}%
`;
    t += `  Levier      : x${sig.leverage}
`;
    t += `  Taille pos. : ${sig.position_size}% du capital
`;
    t += `  Risk/Reward : ${sig.risk_reward?.toFixed(2)}
`;
    t += `  Timeframe   : ${sig.timeframe}
`;
    t += `  Entree      : $${sig.entry?.toLocaleString("en-US",{maximumFractionDigits:6})}
`;
    t += `  Stop Loss   : $${sig.stop_loss?.toLocaleString("en-US",{maximumFractionDigits:6})}
`;
    t += `  Take Profit1: $${sig.take_profit1?.toLocaleString("en-US",{maximumFractionDigits:6})}
`;
    t += `  Take Profit2: $${sig.take_profit2?.toLocaleString("en-US",{maximumFractionDigits:6})}
`;
    t += `  Analyse IA  : ${sig.reasoning||"--"}
`;
    const ks = JSON.parse(sig.key_signals||"[]");
    if(ks.length) t += `  Signaux cles: ${ks.join(" | ")}
`;
    t += `  RSI         : ${sig.rsi?.toFixed(1)||"--"}
`;
    t += `  ATR         : ${sig.atr?.toFixed(4)||"--"}
`;
    t += `  VWAP        : ${sig.vwap?.toFixed(2)||"--"}
`;
    const cur = prices[sig.coin];
    if(cur){
      const dir=sig.action==="LONG"?1:-1;
      const pnl=((cur-sig.entry)/sig.entry*100*dir).toFixed(2);
      const tp1=sig.action==="LONG"?cur>=sig.take_profit1:cur<=sig.take_profit1;
      const tp2=sig.action==="LONG"?cur>=sig.take_profit2:cur<=sig.take_profit2;
      const sl=sig.action==="LONG"?cur<=sig.stop_loss:cur>=sig.stop_loss;
      t += `  Prix actuel : $${cur.toLocaleString()}
`;
      t += `  PnL estime  : ${pnl>0?"+":""}${pnl}%
`;
      t += `  TP1         : ${tp1?"ATTEINT":"En attente"}
`;
      t += `  TP2         : ${tp2?"ATTEINT":"En attente"}
`;
      t += `  Stop Loss   : ${sl?"TOUCHE":"Intact"}
`;
    }
  });
  t += `
${sep}
  Rapport HyperBot AI · Powered by Claude
  Collez ce rapport dans Claude pour analyse
${sep}
`;
  return t;
}

function downloadTxt(content, filename) {
  const b = new Blob([content],{type:"text/plain;charset=utf-8"});
  const u = URL.createObjectURL(b);
  const a = document.createElement("a");
  a.href=u; a.download=filename; a.click();
  URL.revokeObjectURL(u);
}

// ── LOGIN PAGE ───────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    if (!email || !password) { setError("Remplissez tous les champs"); return; }
    setLoading(true); setError("");
    try {
      const path = mode === "login" ? "/api/login" : "/api/register";
      const data = await apiCall(path, "POST", { email, password });
      if (mode === "register") { setMode("login"); setError("Compte créé ! Connectez-vous."); setLoading(false); return; }
      localStorage.setItem("hb_token", data.token);
      localStorage.setItem("hb_email", data.email);
      onLogin(data.token, data.email);
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0a0e1a"}}>
      <div style={{width:380,background:"#0f1629",border:"1px solid #1e2d4a",borderRadius:12,padding:32}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:48,height:48,borderRadius:12,background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,margin:"0 auto 12px"}}>⚡</div>
          <div style={{fontSize:20,fontWeight:700,color:"#f1f5f9"}}>HyperBot AI</div>
          <div style={{fontSize:11,color:"#64748b",marginTop:4}}>Trading autonome · Hyperliquid</div>
        </div>

        <div style={{display:"flex",gap:4,marginBottom:20,background:"#0a0e1a",borderRadius:8,padding:4}}>
          {["login","register"].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setError("");}}
              style={{flex:1,padding:"8px",borderRadius:6,border:"none",background:mode===m?"#1e2d4a":"transparent",color:mode===m?"#60a5fa":"#64748b",fontSize:11,fontWeight:mode===m?700:400}}>
              {m==="login"?"Connexion":"Créer un compte"}
            </button>
          ))}
        </div>

        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:"#475569",marginBottom:4,letterSpacing:1}}>EMAIL</div>
          <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="votre@email.com"
            style={{width:"100%",background:"#0a0e1a",border:"1px solid #1e2d4a",borderRadius:7,padding:"10px 12px",color:"#e2e8f0",fontSize:12}}/>
        </div>

        <div style={{marginBottom:20}}>
          <div style={{fontSize:10,color:"#475569",marginBottom:4,letterSpacing:1}}>MOT DE PASSE</div>
          <input value={password} onChange={e=>setPassword(e.target.value)} type="password" placeholder="••••••••"
            onKeyDown={e=>e.key==="Enter"&&submit()}
            style={{width:"100%",background:"#0a0e1a",border:"1px solid #1e2d4a",borderRadius:7,padding:"10px 12px",color:"#e2e8f0",fontSize:12}}/>
        </div>

        {error && <div style={{background:error.includes("créé")?"#052e16":"#2d0a0a",border:`1px solid ${error.includes("créé")?"#34d399":"#f87171"}`,borderRadius:6,padding:"8px 12px",marginBottom:12,fontSize:11,color:error.includes("créé")?"#34d399":"#f87171"}}>{error}</div>}

        <button onClick={submit} disabled={loading}
          style={{width:"100%",background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",border:"none",borderRadius:8,padding:"12px",color:"#fff",fontWeight:700,fontSize:13}}>
          {loading?"Chargement...":(mode==="login"?"Se connecter":"Créer le compte")}
        </button>

        <div style={{textAlign:"center",marginTop:16,fontSize:10,color:"#334155"}}>
          Vos données sont chiffrées et stockées en sécurité
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────
function App() {
  const [token, setToken] = useState(()=>localStorage.getItem("hb_token")||"");
  const [email, setEmail] = useState(()=>localStorage.getItem("hb_email")||"");
  const [config, setConfig] = useState(null);
  const [signals, setSignals] = useState([]);
  const [prices, setPrices] = useState({});
  const [stats, setStats] = useState({});
  const [aiUsage, setAiUsage] = useState({today:{calls:0,cost_usd:0}, total:{calls:0,cost_usd:0}});
  const [signalsHistory, setSignalsHistory] = useState([]);
  const [pausedCoins, setPausedCoins] = useState([]);
  const [positions, setPositions] = useState([]);
  const [tab, setTab] = useState("dashboard");
  const [logs, setLogs] = useState([]);
  const [paper, setPaper] = useState(null);
  const [aiContinuous, setAiContinuous] = useState(false);
  const [filterHours, setFilterHours] = useState(true);
  const [finnhubKey, setFinnhubKey] = useState("");
  const [hlApiKey, setHlApiKey] = useState("");
  const [sendgridKey, setSendgridKey] = useState("");
  const [alertEmail, setAlertEmail] = useState("");
  const [hlWallet, setHlWallet] = useState("");
  const [filterWeekend, setFilterWeekend] = useState(true);
  const [filterMacro, setFilterMacro] = useState(false);
  const [dailyStats, setDailyStats] = useState(null);
  const [bilan, setBilan] = useState(null);
  const [isRunning, setIsRunning] = useState(false);
  const [sessions, setSessions] = useState([]);
  const [clock, setClock] = useState({utc:"", local:"", market:""});
  const [botLogs, setBotLogs] = useState([]);
  const [persistentLogs, setPersistentLogs] = useState(false);
  const [paperSize, setPaperSize] = useState(50);
  const [liveW, setLiveW] = useState("");
  const [liveK, setLiveK] = useState("");
  const [activeCoins, setActiveCoins] = useState(ALL_COINS);
  const [saved, setSaved] = useState(false);
  const [savedField, setSavedField] = useState("");
  const [loading, setLoading] = useState(false);
  const logEnd = useRef(null);
  const pollRef = useRef(null);

  const flashSave = (field) => {
    setSavedField(field);
    setTimeout(()=>setSavedField(""), 1500);
  };

  const addLog = useCallback((msg, type="info") => {
    setLogs(p=>[...p.slice(-199),{msg,type,time:new Date().toLocaleTimeString("fr-FR")}]);
  },[]);

  const logout = () => {
    apiCall("/api/logout","POST",null,token).catch(()=>{});
    localStorage.removeItem("hb_token");
    localStorage.removeItem("hb_email");
    setToken(""); setEmail("");
  };

  const loadData = useCallback(async () => {
    if (!token) return;
    try {
      // 1. PRIORITÉ ABSOLUE — trades ouverts et PnL
      const pap = await apiCall("/api/paper/portfolio","GET",null,token);
      setPaper(pap);
      // 2. Données secondaires en parallèle
      const [cfg, sigs, prc, st, pos, botLogsRes, aiUse, sigsHist, pausedRes] = await Promise.all([
        apiCall("/api/config","GET",null,token),
        apiCall("/api/signals?limit=50","GET",null,token),
        apiCall("/api/prices","GET",null,token),
        apiCall("/api/stats","GET",null,token),
        apiCall("/api/positions","GET",null,token),
        apiCall("/api/bot/logs","GET",null,token),
        apiCall("/api/stats/ai-usage","GET",null,token),
        apiCall("/api/signals/history?limit=50","GET",null,token),
        apiCall("/api/coins/paused","GET",null,token),
      ]);
      setConfig(cfg);
      setAiContinuous(cfg?.ai_continuous === 1);
      setFilterHours(cfg?.filter_hours !== 0);
      if(cfg?.finnhub_key_preview) setFinnhubKey(cfg?.finnhub_key_preview);
      setFilterWeekend(cfg?.filter_weekend === 1); // OFF par défaut pour crypto
      setFilterMacro(cfg?.filter_macro === 1);
      if(cfg?.alert_email) setAlertEmail(cfg.alert_email);
      if(cfg?.hl_wallet) setHlWallet(cfg.hl_wallet);
      setBotLogs(botLogsRes?.logs||[]);
      setSignals(sigs?.signals||[]);
      setPrices(prc?.prices||{});
      setStats(st);
      setPositions(pos?.positions||[]);
      if(aiUse) setAiUsage(aiUse);
      setSignalsHistory(sigsHist?.signals||[]);
      setPausedCoins(pausedRes?.paused||[]);
      setActiveCoins(cfg?.active_coins||ALL_COINS);
      setIsRunning(!!cfg?.is_running); // sync avec config
    } catch(e) { console.error(e); }
  }, [token]);

  useEffect(() => {
    if(token) {
      loadData();
      const id = setInterval(loadData, 5000);
      return () => clearInterval(id);
    }
  }, [token, loadData]);

  useEffect(() => { logEnd.current?.scrollIntoView({behavior:"smooth"}); }, [logs]);

  useEffect(() => {
    const updateClock = () => {
      const now = new Date();
      const utcH = now.getUTCHours();
      const utcM = String(now.getUTCMinutes()).padStart(2,"0");
      const utcS = String(now.getUTCSeconds()).padStart(2,"0");
      const utcStr = `${String(utcH).padStart(2,"0")}:${utcM}:${utcS}`;
      // GMT-4 toute l'année (AST fixe)
      const localH = (utcH - 4 + 24) % 24;
      const localStr = `${String(localH).padStart(2,"0")}:${utcM}:${utcS}`;
      // Statut marché
      const day = now.getUTCDay(); // 0=dim, 6=sam
      const isWeekend = day === 0 || day === 6;
      const isQuiet = utcH >= 21 && utcH < 23;
      let market = "🟢 MARCHÉ OUVERT";
      let marketColor = "#34d399";
      if(filterMacro) { market = "🔴 PAUSE MACRO"; marketColor = "#f87171"; }
      else if(isWeekend) { market = "🟢 WEEK-END CRYPTO"; marketColor = "#34d399"; }
      else if(isQuiet) { market = "🌙 SESSION CREUSE"; marketColor = "#94a3b8"; }
      setClock({utc: utcStr, local: localStr, market, marketColor});
    };
    updateClock();
    const id = setInterval(updateClock, 1000);
    return () => clearInterval(id);
  }, [filterMacro]);

  const startBot = async () => {
    setLoading(true);
    try {
      await apiCall("/api/bot/start","POST",null,token);
      addLog("🚀 Bot démarré — Scan toutes les 60s", "system");
      loadData();
    } catch(e) { addLog(`❌ ${e.message}`, "error"); }
    setLoading(false);
  };

  const stopBot = async () => {
    try {
      await apiCall("/api/bot/stop","POST",null,token);
      addLog("⏹ Bot arrêté", "system");
      loadData();
    } catch(e) { addLog(`❌ ${e.message}`, "error"); }
  };

  const updateTradingMode = async (mode) => {
    if (mode === config?.trading_mode) return;
    const modeLabel = mode === "paper" ? "Paper Trading" : "LIVE (trades reels)";
    const confirm1 = window.confirm(
      `Basculer en mode ${modeLabel} ?

Cela va reinitialiser :
- Tous les signaux
- Tous les trades paper
- L'historique complet
- Le portefeuille (1000 USDC)

Confirmer ?`
    );
    if (!confirm1) return;
    try {
      await apiCall("/api/config","PUT",{trading_mode:mode},token);
      await apiCall("/api/reset-all","POST",null,token);
      loadData();
      addLog(`Mode ${modeLabel} active - reinitialisation complete`, "system");
    } catch(e){ addLog("Erreur: "+e.message,"error"); }
  };

  const saveConfig = async () => {
    try {
      await apiCall("/api/config","PUT",{ wallet:liveW, api_key:(liveK && liveK.indexOf("****")!==0)?liveK:undefined, active_coins:activeCoins },token);
      setSaved(true); setTimeout(()=>setSaved(false),2500);
      addLog("✅ Paramètres sauvegardés", "system");
      loadData();
    } catch(e) { addLog(`❌ ${e.message}`, "error"); }
  };

  if (!token) return <LoginPage onLogin={(t,e)=>{setToken(t);setEmail(e);}}/>;
  if(!config) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0a0e1a",color:"#60a5fa",fontSize:14}}>Chargement...</div>;

  const TABS = [
    {id:"dashboard",label:"📊 Tableau de bord"},
    {id:"signaux",label:`⚡ Signaux (${signals.filter(s=>s.action!=="WAIT").length})`},
    {id:"historique",label:`📜 Historique (${signalsHistory.filter(s=>s.action!=="WAIT").length})`},
    {id:"positions",label:`📈 Positions (${positions.length})`},
    {id:"marches",label:`🎯 Marchés (${activeCoins.length}/${ALL_COINS.length})`},
    {id:"parametres",label:"⚙️ Paramètres"},
    {id:"logs",label:"📋 Logs"},
    {id:"paper",label:`🎮 Paper Trading`},
    {id:"rapport",label:"📄 Rapport"},
    {id:"stats",label:"📊 Performance"},
    {id:"bilan",label:"💰 Bilan"},
    {id:"sessions",label:"📅 Sessions"},
  ];

  return (
    <div style={{background:"#0a0e1a",minHeight:"100vh"}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#0f1629,#1a1f35)",borderBottom:"1px solid #1e2d4a",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>⚡</div>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:"#f1f5f9"}}>HyperBot AI</div>
            <div style={{fontSize:10,color:"#64748b"}}>{email}</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:isRunning?"#34d399":"#475569",boxShadow:isRunning?"0 0 8px #34d399":"none"}}/>
            <span style={{fontSize:11,color:isRunning?"#34d399":"#64748b"}}>{isRunning?"ACTIF":"INACTIF"}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:2,background:"#050810",borderRadius:6,padding:3,border:"1px solid #1e2d4a"}}>
            <button onClick={()=>updateTradingMode("paper")} style={{padding:"4px 8px",borderRadius:4,border:"none",background:config?.trading_mode==="paper"?"#1e2d4a":"transparent",color:config?.trading_mode==="paper"?"#fbbf24":"#475569",fontSize:10,fontWeight:700,cursor:"pointer"}}>PAPER</button>
            <button onClick={()=>updateTradingMode("live")} style={{padding:"4px 8px",borderRadius:4,border:"none",background:config?.trading_mode==="live"?"#052e16":"transparent",color:config?.trading_mode==="live"?"#34d399":"#475569",fontSize:10,fontWeight:700,cursor:"pointer"}}>LIVE</button>
          </div>
          {isRunning
            ? <button onClick={stopBot} style={{background:"#2d0a0a",border:"1px solid #f87171",borderRadius:6,padding:"5px 12px",color:"#f87171",fontSize:11,fontWeight:700}}>ARRETER</button>
            : <button onClick={startBot} disabled={loading} style={{background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",border:"none",borderRadius:6,padding:"5px 14px",color:"#fff",fontSize:11,fontWeight:700}}>{loading?"...":"DEMARRER"}</button>
          }
          <button onClick={logout} style={{background:"transparent",border:"1px solid #1e2d4a",borderRadius:6,padding:"5px 10px",color:"#64748b",fontSize:10}}>Déconnexion</button>
        </div>
      </div>

      {/* STATS */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:1,background:"#1e2d4a"}}>
        {[{l:"SIGNAUX",v:stats.total||0,c:"#60a5fa"},{l:"LONG",v:stats.longs||0,c:"#34d399"},{l:"SHORT",v:stats.shorts||0,c:"#f87171"},{l:"CONFIANCE",v:stats.avg_confidence?`${stats.avg_confidence}%`:"--",c:confColor(stats.avg_confidence||0)}].map((s,i)=>(
          <div key={i} style={{background:"#0a0e1a",padding:"10px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:700,color:s.c}}>{s.v}</div>
            <div style={{fontSize:9,color:"#475569",marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* CADRAN HORLOGE */}
      <div style={{background:"#0a0e1a",borderTop:"1px solid #0f1629",padding:"8px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",gap:20,alignItems:"center"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:"#334155",letterSpacing:1}}>UTC</div>
            <div style={{fontSize:13,fontWeight:800,color:"#60a5fa",fontFamily:"monospace"}}>{clock.utc}</div>
          </div>
          <div style={{width:1,height:28,background:"#1e2d4a"}}/>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:"#334155",letterSpacing:1}}>GMT-4</div>
            <div style={{fontSize:13,fontWeight:800,color:"#e2e8f0",fontFamily:"monospace"}}>{clock.local}</div>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:4,background:config?.ws_connected?"#052e1644":"#2d0a0a44",border:`1px solid ${config?.ws_connected?"#34d399":"#f87171"}`,borderRadius:20,padding:"3px 10px"}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:config?.ws_connected?"#34d399":"#f87171",boxShadow:config?.ws_connected?"0 0 6px #34d399":"0 0 6px #f87171"}}/>
              <span style={{fontSize:9,fontWeight:700,color:config?.ws_connected?"#34d399":"#f87171"}}>
                WS {config?.ws_connected?"ACTIF":"INACTIF"}
              </span>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:4,background:config?.ws_connected?"#05280e":"#2d0a0a",border:`1px solid ${config?.ws_connected?"#34d399":"#f87171"}`,borderRadius:20,padding:"3px 8px",cursor:config?.ws_connected?"default":"pointer"}}
                onClick={()=>{
                  if(!config?.ws_connected) {
                    if(window.confirm("🔌 Forcer la reconnexion du WebSocket Hyperliquid ?")) {
                      apiCall("/api/ws/reconnect","POST",null,token)
                        .then(()=>{ setTimeout(loadData, 2000); });
                    }
                  }
                }}>
                <div style={{width:6,height:6,borderRadius:"50%",background:config?.ws_connected?"#34d399":"#f87171",animation:config?.ws_connected?"none":"pulse 1s infinite"}}/>
                <span style={{fontSize:9,fontWeight:700,color:config?.ws_connected?"#34d399":"#f87171"}}>
                  WS {config?.ws_connected?"":"↺"}
                </span>
              </div>
              <div style={{background:clock.marketColor+"22",border:`1px solid ${clock.marketColor}`,borderRadius:20,padding:"3px 10px"}}>
                <span style={{fontSize:9,fontWeight:700,color:clock.marketColor}}>{clock.market}</span>
              </div>
            </div>
          </div>
          {config?.reset_at && <div style={{fontSize:9,color:"#334155",textAlign:"right"}}>
            Bot démarré le {new Date(config.reset_at+"Z").toLocaleDateString("fr-FR")} à {new Date(config.reset_at+"Z").toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}
          </div>}
        </div>
      </div>

      {/* TABS */}
      <div style={{display:"flex",borderBottom:"1px solid #1e2d4a",background:"#0f1629",overflowX:"auto"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id); if(t.id==="stats") apiCall("/api/stats/daily","GET",null,token).then(r=>setDailyStats(r)); if(t.id==="rapport") loadData(); if(t.id==="bilan") apiCall("/api/bilan","GET",null,token).then(r=>setBilan(r)); if(t.id==="sessions") apiCall("/api/sessions","GET",null,token).then(r=>setSessions(r?.sessions||[]));}} style={{padding:"10px 14px",background:"transparent",border:"none",borderBottom:tab===t.id?"2px solid #3b82f6":"2px solid transparent",color:tab===t.id?"#60a5fa":"#64748b",fontSize:11,fontWeight:tab===t.id?700:400,whiteSpace:"nowrap"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* DASHBOARD */}
      {tab==="dashboard" && (
        <div style={{padding:16}}>
          <div style={{background:"#0f1629",border:"1px solid #1e2d4a",borderRadius:10,padding:14,marginBottom:14}}>
            <div style={{fontSize:10,color:"#475569",marginBottom:10,letterSpacing:1}}>PRIX EN TEMPS RÉEL</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
              {ALL_COINS.filter(c=>prices[c]).map(coin=>(
                <div key={coin} style={{background:"#0a0e1a",border:"1px solid #1e2d4a",borderRadius:5,padding:"5px 10px",display:"flex",gap:7,alignItems:"center"}}>
                  <span style={{color:"#64748b",fontSize:10}}>{coin}</span>
                  <span style={{color:"#e2e8f0",fontWeight:700,fontSize:12}}>${prices[coin]?.toLocaleString("en-US",{maximumFractionDigits:2})}</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div style={{background:"#0f1629",border:"1px solid #1e2d4a",borderRadius:10,padding:14}}>
              <div style={{fontSize:10,color:"#475569",marginBottom:8,letterSpacing:1}}>ACTIVITE DU BOT</div>
            <div style={{maxHeight:100,overflowY:"auto",marginBottom:12}}>
              {botLogs.length===0
                ? <div style={{fontSize:9,color:"#334155",fontFamily:"monospace"}}>{isRunning?"⚡ En attente...":"● Bot arrêté"}</div>
                : botLogs.slice(0,6).map((log,i)=>(
                  <div key={i} style={{display:"flex",gap:6,marginBottom:2}}>
                    <span style={{fontSize:9,color:"#334155",whiteSpace:"nowrap",fontFamily:"monospace"}}>{log.time}</span>
                    <span style={{fontSize:9,fontFamily:"monospace",color:log.level==="success"?"#34d399":log.level==="error"?"#f87171":log.level==="warning"?"#fbbf24":"#475569"}}>{log.message}</span>
                  </div>
                ))
              }
            </div>
            <div style={{fontSize:9,color:"#475569",marginBottom:10,letterSpacing:1}}>DERNIERS SIGNAUX</div>
              {signals.filter(s=>s.action!=="WAIT").slice(0,5).length===0
                ? <div style={{color:"#334155",fontSize:11,padding:"16px 0",textAlign:"center"}}>{isRunning?"Analyse en cours...":"Démarrez le bot"}</div>
                : signals.filter(s=>s.action!=="WAIT").slice(0,5).map(sig=>(
                  <div key={sig.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #0a0e1a"}}>
                    <div style={{display:"flex",gap:7,alignItems:"center"}}>
                      <span style={{background:sig.action==="LONG"?"#052e16":"#2d0a0a",color:sig.action==="LONG"?"#34d399":"#f87171",padding:"2px 7px",borderRadius:4,fontSize:10,fontWeight:700}}>{sig.action}</span>
                      <span style={{color:"#e2e8f0",fontSize:12}}>{sig.coin}</span>
                    </div>
                    <span style={{color:confColor(sig.confidence),fontWeight:700}}>{sig.confidence}%</span>
                  </div>
                ))
              }
            </div>
            <div style={{background:"#0f1629",border:"1px solid #1e2d4a",borderRadius:10,padding:14}}>
              <div style={{fontSize:10,color:"#475569",marginBottom:10,letterSpacing:1}}>STATUT SERVEUR</div>
              {[
                {l:"Mode",v:"Serveur 24h/24"},
                {l:"Bot",v:isRunning?"✅ Actif":"⏹ Arrêté"},
                {l:"Mode trading",v:config.trading_mode==="paper"?"Paper (simulation)":"Live (reel)"},
                {l:"Dernier scan",v:config.last_scan?new Date(config.last_scan).toLocaleTimeString("fr-FR"):"Jamais"},
                {l:"Marchés actifs",v:`${activeCoins.length}/${ALL_COINS.length}`},
                {l:"Clé API",v:config.has_api_key?"✅ Définie":"❌ Manquante"},
                {l:"Wallet",v:config.wallet?`${config.wallet.slice(0,8)}...`:"Non défini"},
                {l:"🤖 Appels IA (aujourd'hui)",v:`${aiUsage.today?.calls||0} appels — $${(aiUsage.today?.cost_usd||0).toFixed(3)}`},
                {l:"🤖 Appels IA (total)",v:`${aiUsage.total?.calls||0} appels — $${(aiUsage.total?.cost_usd||0).toFixed(2)}`},
              ].map((x,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #0a0e1a"}}>
                  <span style={{color:"#475569",fontSize:10}}>{x.l}</span>
                  <span style={{color:"#94a3b8",fontSize:10}}>{x.v}</span>
                </div>
              ))}
              {config.pause_until && new Date(config.pause_until+"Z") > new Date() ? (
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0"}}>
                  <span style={{color:"#f87171",fontSize:10}}>⏸️ Pause générale (manuelle)</span>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{color:"#f87171",fontSize:10}}>jusqu'à {new Date(config.pause_until+"Z").toLocaleTimeString("fr-FR")}</span>
                    <button onClick={()=>apiCall("/api/config","PUT",{resume_now:true},token).then(loadData)} style={{background:"#052e16",border:"1px solid #34d399",borderRadius:4,padding:"2px 8px",color:"#34d399",fontSize:9,fontWeight:700,cursor:"pointer"}}>Reprendre</button>
                  </div>
                </div>
              ) : (
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0"}}>
                  <span style={{color:"#475569",fontSize:10}}>Pause générale du bot</span>
                  <button onClick={()=>apiCall("/api/config","PUT",{pause_now:true},token).then(loadData)} style={{background:"#2d0a0a",border:"1px solid #f87171",borderRadius:4,padding:"2px 8px",color:"#f87171",fontSize:9,fontWeight:700,cursor:"pointer"}}>Mettre en pause</button>
                </div>
              )}
              {pausedCoins.length>0 && (
                <div style={{padding:"7px 0"}}>
                  <div style={{color:"#f87171",fontSize:10,marginBottom:4}}>⏸️ Actifs en pause auto (3 pertes) :</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {pausedCoins.map((p,i)=>(
                      <span key={i} title={`Jusqu'à ${new Date(p.paused_until+"Z").toLocaleTimeString("fr-FR")}`} style={{background:"#2d0a0a",color:"#f87171",padding:"2px 7px",borderRadius:4,fontSize:9,fontWeight:700}}>{p.coin}</span>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* SIGNAUX */}
      {tab==="signaux" && (
        <div style={{padding:16}}>
          {signals.filter(s=>s.action!=="WAIT").length===0
            ? <div style={{textAlign:"center",padding:50,color:"#475569"}}>{isRunning?"Analyse IA en cours...":"Aucun signal — démarrez le bot"}</div>
            : signals.filter(s=>s.action!=="WAIT").map(sig=>(
              <div key={sig.id} style={{background:"#0f1629",border:`1px solid ${sig.action==="LONG"?"#14532d":"#450a0a"}`,borderRadius:10,padding:14,marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{background:sig.action==="LONG"?"#052e16":"#2d0a0a",color:sig.action==="LONG"?"#34d399":"#f87171",padding:"3px 9px",borderRadius:5,fontSize:12,fontWeight:700}}>{sig.action}</span>
                    <span style={{fontSize:15,fontWeight:700,color:"#f1f5f9"}}>{sig.coin}/USDC</span>
                    <span style={{background:"#1e2d4a",color:"#60a5fa",padding:"1px 7px",borderRadius:4,fontSize:10}}>x{sig.leverage}</span>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:18,fontWeight:700,color:confColor(sig.confidence)}}>{sig.confidence}%</div>
                    <div style={{fontSize:9,color:"#475569"}}>CONFIANCE</div>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7,marginBottom:10}}>
                  {[{l:"ENTRÉE",v:`$${sig.entry?.toFixed(4)}`,c:"#60a5fa"},{l:"STOP LOSS",v:`$${sig.stop_loss?.toFixed(4)}`,c:"#f87171"},{l:"TP1",v:`$${sig.take_profit1?.toFixed(4)}`,c:"#34d399"},{l:"TP2",v:`$${sig.take_profit2?.toFixed(4)}`,c:"#34d399"}].map((x,i)=>(
                    <div key={i} style={{background:"#0a0e1a",borderRadius:5,padding:"7px 8px"}}>
                      <div style={{fontSize:9,color:"#475569",marginBottom:2}}>{x.l}</div>
                      <div style={{fontSize:11,fontWeight:700,color:x.c}}>{x.v}</div>
                    </div>
                  ))}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:10}}>
                  <div style={{background:"#0a0e1a",borderRadius:5,padding:"6px 8px"}}><div style={{fontSize:9,color:"#475569"}}>TAILLE</div><div style={{color:"#e2e8f0",fontWeight:700}}>{sig.position_size}%</div></div>
                  <div style={{background:"#0a0e1a",borderRadius:5,padding:"6px 8px"}}><div style={{fontSize:9,color:"#475569"}}>RISK/REWARD</div><div style={{color:sig.risk_reward>=2?"#34d399":"#fbbf24",fontWeight:700}}>{sig.risk_reward?.toFixed(2)}</div></div>
                  <div style={{background:"#0a0e1a",borderRadius:5,padding:"6px 8px"}}><div style={{fontSize:9,color:"#475569"}}>TIMEFRAME</div><div style={{color:"#94a3b8",fontSize:11}}>{sig.timeframe}</div></div>
                </div>
                {sig.reasoning&&<div style={{background:"#0a0e1a",borderRadius:5,padding:9,marginBottom:8,borderLeft:"3px solid #8b5cf6"}}><div style={{fontSize:9,color:"#c084fc",marginBottom:3}}>🤖 ANALYSE IA</div><div style={{color:"#94a3b8",fontSize:11,lineHeight:1.6}}>{sig.reasoning}</div></div>}
                {sig.key_signals&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>{JSON.parse(sig.key_signals||"[]").map((s,i)=><span key={i} style={{background:"#1e2d4a",color:"#60a5fa",padding:"2px 7px",borderRadius:3,fontSize:10}}>{s}</span>)}</div>}
                <div style={{fontSize:10,color:"#334155"}}>
                  {new Date(sig.created_at).toLocaleString("fr-FR")} · RSI:{sig.rsi?.toFixed(1)} · Prix:{`$${sig.price?.toLocaleString()}`}
                  {prices[sig.coin]&&<span style={{marginLeft:8,color:((prices[sig.coin]-sig.entry)/sig.entry*100*(sig.action==="LONG"?1:-1))>=0?"#34d399":"#f87171"}}>
                    · PnL: {((prices[sig.coin]-sig.entry)/sig.entry*100*(sig.action==="LONG"?1:-1)).toFixed(2)}%
                  </span>}
                </div>
              </div>
            ))
          }
        </div>
      )}

      {/* HISTORIQUE — signaux tradés ET fermés, groupés par actif (ordre alphabétique) */}
      {tab==="historique" && (
        <div style={{padding:16}}>
          {signalsHistory.filter(s=>s.action!=="WAIT").length===0
            ? <div style={{textAlign:"center",padding:50,color:"#475569"}}>Aucun trade fermé pour l'instant</div>
            : Object.entries(
                signalsHistory.filter(s=>s.action!=="WAIT").reduce((acc,sig)=>{
                  (acc[sig.coin] = acc[sig.coin]||[]).push(sig);
                  return acc;
                }, {})
              )
              .sort(([coinA],[coinB])=>coinA.localeCompare(coinB))
              .map(([coin,sigs])=>(
                <div key={coin} style={{marginBottom:20}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#60a5fa",marginBottom:8,paddingBottom:6,borderBottom:"1px solid #1e2d4a"}}>
                    {coin}/USDC <span style={{color:"#475569",fontWeight:400,fontSize:11}}>({sigs.length} trade{sigs.length>1?"s":""})</span>
                  </div>
                  {sigs.sort((a,b)=>new Date(b.trade_closed_at)-new Date(a.trade_closed_at)).map(sig=>(
              <div key={sig.id} style={{background:"#0f1629",border:`1px solid ${sig.trade_pnl>=0?"#14532d":"#450a0a"}`,borderRadius:10,padding:14,marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{background:sig.action==="LONG"?"#052e16":"#2d0a0a",color:sig.action==="LONG"?"#34d399":"#f87171",padding:"3px 9px",borderRadius:5,fontSize:12,fontWeight:700}}>{sig.action}</span>
                    <span style={{fontSize:15,fontWeight:700,color:"#f1f5f9"}}>{sig.coin}/USDC</span>
                    <span style={{background:"#1e2d4a",color:"#60a5fa",padding:"1px 7px",borderRadius:4,fontSize:10}}>x{sig.leverage}</span>
                    <span style={{background:"#1e2d4a",color:"#94a3b8",padding:"1px 7px",borderRadius:4,fontSize:10}}>{sig.trade_close_reason}</span>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:18,fontWeight:700,color:sig.trade_pnl>=0?"#34d399":"#f87171"}}>{sig.trade_pnl>=0?"+":""}{sig.trade_pnl?.toFixed(2)}$</div>
                    <div style={{fontSize:9,color:"#475569"}}>PNL ({sig.trade_pnl_pct?.toFixed(1)}%)</div>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7,marginBottom:10}}>
                  {[{l:"ENTRÉE",v:`$${sig.entry?.toFixed(4)}`,c:"#60a5fa"},{l:"STOP LOSS",v:`$${sig.stop_loss?.toFixed(4)}`,c:"#f87171"},{l:"TP1",v:`$${sig.take_profit1?.toFixed(4)}`,c:"#34d399"},{l:"TP2",v:`$${sig.take_profit2?.toFixed(4)}`,c:"#34d399"}].map((x,i)=>(
                    <div key={i} style={{background:"#0a0e1a",borderRadius:5,padding:"7px 8px"}}>
                      <div style={{fontSize:9,color:"#475569",marginBottom:2}}>{x.l}</div>
                      <div style={{fontSize:11,fontWeight:700,color:x.c}}>{x.v}</div>
                    </div>
                  ))}
                </div>
                {sig.reasoning&&<div style={{background:"#0a0e1a",borderRadius:5,padding:9,marginBottom:8,borderLeft:"3px solid #8b5cf6"}}><div style={{fontSize:9,color:"#c084fc",marginBottom:3}}>{sig.reasoning?.includes("Règles")?"📐 ANALYSE":"🤖 ANALYSE IA"}</div><div style={{color:"#94a3b8",fontSize:11,lineHeight:1.6}}>{sig.reasoning}</div></div>}
                <div style={{fontSize:10,color:"#334155"}}>

              </div>
            ))}
          </div>
          <button onClick={()=>{
              const txt = `HYPERBOT AI -- PERFORMANCE\n${"=".repeat(60)}\nWin Rate: ${dailyStats?.summary?.win_rate}%\nTotal Gains: +${dailyStats?.summary?.total_wins_usdc} USDC\nTotal Pertes: ${dailyStats?.summary?.total_losses_usdc} USDC\nNet: ${(dailyStats?.summary?.total_wins_usdc||0)+(dailyStats?.summary?.total_losses_usdc||0)} USDC\n\nDETAIL PAR JOUR:\n${(dailyStats?.daily||[]).map(d=>`${d.day} | ✅${d.wins} ❌${d.losses} | Net: ${Math.round(d.net_pnl*100)/100} USDC`).join("\n")}`;
              downloadTxt(txt, `performance-${new Date().toISOString().slice(0,10)}.txt`);
            }}
            style={{width:"100%",marginTop:12,background:"linear-gradient(135deg,#1d4ed8,#7c3aed)",border:"none",borderRadius:8,padding:"10px",color:"#fff",fontWeight:700,fontSize:11,cursor:"pointer"}}>
            ⬇️ Télécharger Performance
          </button>
          </>)}
        </div>
      )}

      {/* SESSIONS */}
      {tab==="sessions" && (
        <div style={{padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:700,color:"#60a5fa"}}>📅 Sessions de Trading</div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={async()=>{
                try {
                  const r = await apiCall("/api/sessions/cleanup","POST",null,token);
                  alert("✅ " + (r?.message || "Nettoyage effectué"));
                  const s = await apiCall("/api/sessions","GET",null,token);
                  setSessions(s?.sessions||[]);
                } catch(e) {
                  alert("❌ Erreur: " + e.message);
                }
              }} style={{background:"#2d0a0a",border:"1px solid #f87171",borderRadius:6,padding:"5px 10px",color:"#f87171",fontSize:9,cursor:"pointer",fontWeight:700}}>
                🧹 Nettoyer
              </button>
              <button onClick={()=>apiCall("/api/sessions","GET",null,token).then(r=>setSessions(r?.sessions||[]))}
                style={{background:"#0f1629",border:"1px solid #1e2d4a",borderRadius:6,padding:"5px 12px",color:"#475569",fontSize:10,cursor:"pointer"}}>
                🔄 Actualiser
              </button>
            </div>
          </div>

          {sessions.length===0 ? <div style={{color:"#475569",textAlign:"center",padding:40}}>Aucune session disponible</div> :
          sessions.map((s,i)=>(
            <div key={i} style={{background:"#0a1628",border:"1px solid #1e3a5f",borderRadius:12,padding:14,marginBottom:12}}>
              {/* Header session */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div>
                  <span style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>📅 {s.session_date}</span>
                  {s.closing_phase && !s.ended_at && <span style={{marginLeft:8,fontSize:9,color:"#f59e0b",border:"1px solid #f59e0b",borderRadius:10,padding:"2px 6px"}}>EN CLÔTURE</span>}
                  {s.ended_at && <span style={{marginLeft:8,fontSize:9,color:"#34d399",border:"1px solid #34d399",borderRadius:10,padding:"2px 6px"}}>✅ CLÔTURÉE</span>}
                  {s.pending_trades>0 && <span style={{marginLeft:8,fontSize:9,color:"#f59e0b",border:"1px solid #f59e0b",borderRadius:10,padding:"2px 6px"}}>⏳ {s.pending_trades} en cours</span>}
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:13,fontWeight:800,color:s.net_pnl>=0?"#34d399":"#f87171"}}>
                      {s.net_pnl>=0?"+":""}{Math.round((s.net_pnl||0)*100)/100} $
                    </div>
                    <div style={{fontSize:10,fontWeight:700,color:s.net_pnl>=0?"#34d399":"#f87171"}}>
                      {s.net_pnl>=0?"+":""}{Math.round((s.net_pnl||0)/Math.max(s.capital_start||1000,1)*10000)/100} %
                    </div>
                  </div>
                  <button onClick={()=>{
                    const csv = generateSessionCSV(s);
                    const b = new Blob([csv],{type:"text/csv;charset=utf-8"});
                    const u = URL.createObjectURL(b);
                    const a = document.createElement("a");
                    a.href=u; a.download=`session-${s.session_date}.csv`;
                    a.click(); URL.revokeObjectURL(u);
                  }} style={{background:"#052e16",border:"1px solid #34d399",borderRadius:6,padding:"4px 10px",color:"#34d399",fontSize:9,cursor:"pointer",fontWeight:700}}>
                    ⬇️ CSV
                  </button>
                </div>
              </div>

              {/* Stats globales */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:10}}>
                <div style={{textAlign:"center",background:"#0f1629",borderRadius:6,padding:6}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>{s.total_trades}</div>
                  <div style={{fontSize:9,color:"#475569"}}>TRADES</div>
                </div>
                <div style={{textAlign:"center",background:"#052e16",borderRadius:6,padding:6}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#34d399"}}>{s.wins}</div>
                  <div style={{fontSize:9,color:"#34d399"}}>GAINS</div>
                </div>
                <div style={{textAlign:"center",background:"#2d0a0a",borderRadius:6,padding:6}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#f87171"}}>{s.losses}</div>
                  <div style={{fontSize:9,color:"#f87171"}}>PERTES</div>
                </div>
                <div style={{textAlign:"center",background:(s.net_pnl||0)>=0?"#052e16":"#2d0a0a",borderRadius:6,padding:6}}>
                  <div style={{fontSize:14,fontWeight:700,color:(s.net_pnl||0)>=0?"#34d399":"#f87171"}}>
                    {Math.round((s.net_pnl||0)/Math.max(s.capital_start||1000,1)*10000)/100}%
                  </div>
                  <div style={{fontSize:9,color:"#475569"}}>GAIN/CAP</div>
                </div>
              </div>

              {/* Par actif */}
              {(s.by_coin||[]).length > 0 && (
                <div style={{borderTop:"1px solid #0f1629",paddingTop:8}}>
                  <div style={{fontSize:9,color:"#475569",marginBottom:6,letterSpacing:1}}>PAR ACTIF</div>
                  {s.by_coin.map((coin,j)=>(
                    <div key={j} style={{display:"flex",justifyContent:"space-between",fontSize:10,padding:"4px 0",borderBottom:"1px solid #0a0e1a"}}>
                      <span style={{color:"#e2e8f0",fontWeight:700,width:50}}>{coin.coin}</span>
                      <span style={{color:"#475569"}}>{coin.total} trades</span>
                      <span style={{color:"#34d399"}}>✅{coin.wins}</span>
                      <span style={{color:"#f87171"}}>❌{coin.losses}</span>

                      <span style={{fontWeight:700,color:(coin.net||0)>=0?"#34d399":"#f87171"}}>
                        {(coin.net||0)>=0?"+":""}{Math.round((coin.net||0)*100)/100}$
                      </span>
                      {coin.still_open>0 && <span style={{color:"#f59e0b",fontSize:9}}>⏳{coin.still_open}</span>}
                    </div>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* BILAN */}
      {tab==="bilan" && (
        <div style={{padding:14}}>
          {!bilan ? <div style={{color:"#475569",fontSize:12,textAlign:"center",padding:40}}>
            <button onClick={()=>apiCall("/api/bilan","GET",null,token).then(r=>setBilan(r))}
              style={{background:"#1e2d4a",border:"1px solid #3b82f6",borderRadius:8,padding:"10px 20px",color:"#60a5fa",cursor:"pointer"}}>
              📊 Charger le bilan
            </button>
          </div> : (<>

          {/* BALANCE */}
          <div style={{background:"#0a1628",border:"1px solid #1e3a5f",borderRadius:12,padding:16,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontSize:11,color:"#475569",letterSpacing:1}}>💼 CAPITAL</div>
              {bilan.reset_at && (() => {
                const start = new Date(bilan.reset_at+"Z");
                const now = new Date();
                const diff = Math.floor((now - start) / 1000);
                const h = Math.floor(diff/3600);
                const m = Math.floor((diff%3600)/60);
                const ratePerH = h > 0 ? (bilan.total?.net / (h + m/60)).toFixed(2) : "...";
                return <div style={{fontSize:10,color:"#475569"}}>
                  ⏱️ <span style={{color:"#60a5fa",fontWeight:700}}>{h}h{String(m).padStart(2,"0")}</span> de trading · 
                  <span style={{color:"#34d399",fontWeight:700}}> {ratePerH}$/h</span>
                </div>;
              })()}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:800,color:"#60a5fa"}}>{bilan.balance} $</div>
                <div style={{fontSize:9,color:"#334155"}}>DISPONIBLE</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:800,color:"#e2e8f0"}}>{bilan.total_capital} $</div>
                <div style={{fontSize:9,color:"#334155"}}>TOTAL</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:800,color:bilan.performance_pct>=0?"#34d399":"#f87171"}}>
                  {bilan.performance_pct>=0?"+":""}{bilan.performance_pct}%
                </div>
                <div style={{fontSize:9,color:"#334155"}}>PERFORMANCE</div>
              </div>
            </div>
          </div>

          {/* AUJOURD'HUI */}
          <div style={{background:"#0a1628",border:"1px solid #1e3a5f",borderRadius:12,padding:16,marginBottom:12}}>
            <div style={{fontSize:11,color:"#475569",marginBottom:8,letterSpacing:1}}>📅 AUJOURD'HUI</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <div style={{background:"#052e16",borderRadius:8,padding:10,textAlign:"center"}}>
                <div style={{fontSize:16,fontWeight:800,color:"#34d399"}}>+{bilan.today.gains} $</div>
                <div style={{fontSize:9,color:"#34d399"}}>{bilan.today.wins} GAINS</div>
              </div>
              <div style={{background:"#2d0a0a",borderRadius:8,padding:10,textAlign:"center"}}>
                <div style={{fontSize:16,fontWeight:800,color:"#f87171"}}>{bilan.today.pertes} $</div>
                <div style={{fontSize:9,color:"#f87171"}}>{bilan.today.losses} PERTES</div>
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderTop:"1px solid #0f1629"}}>
              <span style={{fontSize:11,color:"#64748b"}}>{bilan.today.total} trades · Win rate {bilan.today.win_rate}%</span>
              <span style={{fontSize:13,fontWeight:800,color:bilan.today.net>=0?"#34d399":"#f87171"}}>
                {bilan.today.net>=0?"+":""}{bilan.today.net} $ NET
              </span>
            </div>
          </div>

          {/* TOTAL DEPUIS DEBUT */}
          <div style={{background:"#0a1628",border:"1px solid #1e3a5f",borderRadius:12,padding:16,marginBottom:12}}>
            <div style={{fontSize:11,color:"#475569",marginBottom:8,letterSpacing:1}}>🏆 TOTAL DEPUIS LE DÉBUT</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <div style={{background:"#052e16",borderRadius:8,padding:10,textAlign:"center"}}>
                <div style={{fontSize:16,fontWeight:800,color:"#34d399"}}>+{bilan.total.gains} $</div>
                <div style={{fontSize:9,color:"#34d399"}}>{bilan.total.wins} GAINS</div>
              </div>
              <div style={{background:"#2d0a0a",borderRadius:8,padding:10,textAlign:"center"}}>
                <div style={{fontSize:16,fontWeight:800,color:"#f87171"}}>{bilan.total.pertes} $</div>
                <div style={{fontSize:9,color:"#f87171"}}>{bilan.total.losses} PERTES</div>
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderTop:"1px solid #0f1629"}}>
              <span style={{fontSize:11,color:"#64748b"}}>{bilan.total.total} trades · Win rate {bilan.total.win_rate}%</span>
              <span style={{fontSize:13,fontWeight:800,color:bilan.total.net>=0?"#34d399":"#f87171"}}>
                {bilan.total.net>=0?"+":""}{bilan.total.net} $ NET
              </span>
            </div>
          </div>

          {/* PAR JOUR */}
          <div style={{background:"#0a1628",border:"1px solid #1e3a5f",borderRadius:12,padding:16}}>
            <div style={{fontSize:11,color:"#475569",marginBottom:8,letterSpacing:1}}>📆 7 DERNIERS JOURS</div>
            {bilan.daily.map((d,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #0f1629",fontSize:11}}>
                <span style={{color:"#64748b"}}>{d.day}</span>
                <span style={{color:"#34d399"}}>✅ {d.wins}</span>
                <span style={{color:"#f87171"}}>❌ {d.losses}</span>
                <span style={{color:"#64748b"}}>{d.total} trades</span>
                <div style={{textAlign:"right"}}>
                  <div style={{fontWeight:700,color:d.net>=0?"#34d399":"#f87171"}}>
                    {d.net>=0?"+":""}{Math.round(d.net*100)/100} $
                  </div>
                  <div style={{fontSize:9,color:d.net>=0?"#34d399":"#f87171"}}>
                    {d.net>=0?"+":""}{Math.round(d.net/Math.max(d.capital_start||bilan.initial_balance||1000,1)*10000)/100} %
                  </div>
                </div>
              </div>
            ))}
          </div>

          <div style={{display:"flex",gap:8,marginTop:12}}>
            <button onClick={()=>apiCall("/api/bilan","GET",null,token).then(r=>setBilan(r))}
              style={{flex:1,background:"#0f1629",border:"1px solid #1e2d4a",borderRadius:8,padding:"10px",color:"#475569",fontSize:11,cursor:"pointer"}}>
              🔄 Actualiser
            </button>
            <button onClick={()=>downloadTxt(generateBilan(bilan,paper),`bilan-${new Date().toISOString().slice(0,10)}.txt`)}
              style={{flex:1,background:"linear-gradient(135deg,#1d4ed8,#7c3aed)",border:"none",borderRadius:8,padding:"10px",color:"#fff",fontWeight:700,fontSize:11,cursor:"pointer"}}>
              ⬇️ Télécharger Bilan
            </button>
          </div>

          {/* PAR ACTIF */}
          <div style={{background:"#0a1628",border:"1px solid #1e3a5f",borderRadius:12,padding:16,marginTop:12}}>
            <div style={{fontSize:11,color:"#475569",marginBottom:8,letterSpacing:1}}>🎯 PERFORMANCE PAR ACTIF</div>
            {(bilan.by_coin||[]).map((coin,i)=>{
              const h = Math.floor((coin.total_minutes||0)/60);
              const m = (coin.total_minutes||0)%60;
              const timeStr = h>0?`${h}h${String(m).padStart(2,"0")}`:`${m}min`;
              return (
                <div key={i} style={{padding:"8px 0",borderBottom:"1px solid #0f1629"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                    <span style={{fontSize:12,fontWeight:700,color:"#e2e8f0"}}>{coin.coin}</span>
                    <span style={{fontSize:12,fontWeight:800,color:coin.net>=0?"#34d399":"#f87171"}}>
                      {coin.net>=0?"+":""}{coin.net}$
                    </span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#475569"}}>
                    <span>✅{coin.wins} (+{coin.avg_gain}$) ❌{coin.losses} ({coin.avg_loss}$)</span>
                    <span style={{color:coin.win_rate>=50?"#34d399":"#f87171"}}>{coin.win_rate}%</span>
                  </div>
                  <div style={{fontSize:9,color:"#334155",marginTop:2}}>
                    ⏱️ {timeStr} de trading · {coin.total} trades
                  </div>
                </div>
              );
            })}
          </div>
          </>)}
        </div>
      )}

      {/* RAPPORT */}
      {tab==="rapport" && (
        <div style={{padding:16,maxWidth:800}}>
          <div style={{background:"#0f1629",border:"1px solid #1e2d4a",borderRadius:10,padding:20,marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:"#60a5fa",marginBottom:4}}>📄 Rapport de session</div>
            <div style={{fontSize:11,color:"#475569",marginBottom:16,lineHeight:1.7}}>
              Exportez tous les signaux avec niveaux, suivi TP/SL et analyse IA. Collez dans Claude pour analyse approfondie.
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>
              {[{l:"Signaux",v:stats.total||0,c:"#60a5fa"},{l:"Confiance moy.",v:`${stats.avg_confidence||0}%`,c:confColor(stats.avg_confidence||0)},{l:"R/R moyen",v:stats.avg_rr||"--",c:"#c084fc"}].map((s,i)=>(
                <div key={i} style={{background:"#0a0e1a",borderRadius:6,padding:"9px",textAlign:"center"}}>
                  <div style={{fontSize:18,fontWeight:700,color:s.c}}>{s.v}</div>
                  <div style={{fontSize:9,color:"#475569",marginTop:2}}>{s.l}</div>
                </div>
              ))}
            </div>
            <div style={{background:"#0a0e1a",borderRadius:7,padding:12,marginBottom:14}}>
              <div style={{fontSize:10,color:"#475569",marginBottom:8,letterSpacing:1}}>SUIVI TP/SL EN TEMPS REEL</div>
              {signals.filter(s=>s.action!=="WAIT").length===0
                ?<div style={{color:"#334155",fontSize:11}}>Aucun signal a suivre.</div>
                :signals.filter(s=>s.action!=="WAIT").slice(0,10).map(sig=>{
                  const cur=prices[sig.coin]; if(!cur) return null;
                  const dir=sig.action==="LONG"?1:-1;
                  const pnl=((cur-sig.entry)/sig.entry*100*dir).toFixed(2);
                  const tp1=sig.action==="LONG"?cur>=sig.take_profit1:cur<=sig.take_profit1;
                  const tp2=sig.action==="LONG"?cur>=sig.take_profit2:cur<=sig.take_profit2;
                  const sl=sig.action==="LONG"?cur<=sig.stop_loss:cur>=sig.stop_loss;
                  return (
                    <div key={sig.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #0f1629"}}>
                      <div style={{display:"flex",gap:7,alignItems:"center"}}>
                        <span style={{color:sig.action==="LONG"?"#34d399":"#f87171",fontSize:10,fontWeight:700}}>{sig.action}</span>
                        <span style={{color:"#e2e8f0",fontSize:11}}>{sig.coin}</span>
                        <span style={{color:"#475569",fontSize:10}}>{new Date(sig.created_at).toLocaleTimeString("fr-FR")}</span>
                      </div>
                      <div style={{display:"flex",gap:8,fontSize:10}}>
                        <span style={{color:parseFloat(pnl)>=0?"#34d399":"#f87171",fontWeight:700}}>{pnl>0?"+":""}{pnl}%</span>
                        <span style={{color:tp1?"#34d399":"#334155"}}>TP1{tp1?"✓":"○"}</span>
                        <span style={{color:tp2?"#34d399":"#334155"}}>TP2{tp2?"✓":"○"}</span>
                        <span style={{color:sl?"#f87171":"#334155"}}>SL{sl?"✗":"○"}</span>
                      </div>
                    </div>
                  );
                })
              }
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>downloadTxt(generateReport(signals||[],stats||{},prices||{},email||"",paper),`hyperbot-${new Date().toISOString().slice(0,10)}.txt`)}
                style={{flex:1,background:"linear-gradient(135deg,#1d4ed8,#7c3aed)",border:"none",borderRadius:8,padding:"11px",color:"#fff",fontWeight:700,fontSize:12}}>
                ⬇️ Telecharger .txt
              </button>
              <button onClick={()=>{
                const txt = generateReport(signals||[],stats||{},prices||{},email||"",paper);
                if(!txt || txt.length < 10) { alert("Rapport vide - rechargez la page"); return; }
                navigator.clipboard.writeText(txt)
                  .then(()=>alert("✅ Copié ! (" + txt.length + " caractères)"))
                  .catch(()=>{
                    const ta = document.createElement("textarea");
                    ta.value = txt;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand("copy");
                    document.body.removeChild(ta);
                    alert("✅ Copié via fallback !");
                  });
              }}
                style={{flex:1,background:"#0f1629",border:"1px solid #1e2d4a",borderRadius:8,padding:"11px",color:"#94a3b8",fontWeight:700,fontSize:12}}>
                📋 Copier pour Claude
              </button>
            </div>
          </div>
        </div>
      )}

      <div style={{textAlign:"center",padding:"14px",color:"#1e2d4a",fontSize:10,borderTop:"1px solid #0f1629",marginTop:16}}>
        HyperBot AI — Serveur autonome 24h/24 · Powered by Claude
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
